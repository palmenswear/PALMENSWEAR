<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PAL MENS WEAR — Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0d1b2a;--gold:#c9a84c;--gold-light:#e8c97e;
  --cream:#f8f4ee;--charcoal:#2c2c2c;--mid:#6b6b6b;
  --border:#e0d8cc;--white:#fff;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --blue:#0C447C;--blue-bg:#E6F1FB;
  --amber:#633806;--amber-bg:#FAEEDA;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --red:#791F1F;--red-bg:#FCEBEB;
  --teal:#085041;--teal-bg:#E1F5EE;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}

/* LOGIN */
#loginScreen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--navy);}
#loginScreen.active{display:flex;}
.login-box{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--navy);letter-spacing:3px;margin-bottom:4px;}
.login-sub{font-size:.76rem;color:var(--mid);letter-spacing:1px;text-transform:uppercase;margin-bottom:30px;}
.ll{font-size:.71rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;text-align:left;display:block;margin-bottom:6px;}
.lsel,.lpin{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--charcoal);background:var(--cream);outline:none;transition:border-color .2s;margin-bottom:14px;}
.lsel:focus,.lpin:focus{border-color:var(--gold);background:var(--white);}
.lbtn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:4px;}
.lbtn:hover{background:#1a2e42;}
.lerr{color:#a02020;font-size:.8rem;margin-top:10px;min-height:18px;}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:8px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);transition:all .2s;}
.pin-dot.f{background:var(--navy);border-color:var(--navy);}

/* ROLE BADGE on login */
.role-legend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.rl-badge{font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:20px;}
.rl-admin{background:#FFF3E0;color:#E65100;}
.rl-mgr{background:var(--amber-bg);color:var(--amber);}
.rl-staff{background:var(--blue-bg);color:var(--blue);}

/* NAV */
nav{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:62px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--gold);letter-spacing:2px;}
.nav-logo span{color:rgba(255,255,255,.6);font-weight:400;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.nav-name{font-size:.82rem;color:rgba(255,255,255,.88);font-weight:500;}
.nav-sub{font-size:.68rem;color:rgba(255,255,255,.45);}
.role-chip{font-size:.66rem;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.3px;}
.chip-admin{background:#FF6D00;color:#fff;}
.chip-mgr{background:var(--gold);color:var(--navy);}
.chip-staff{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);}
.lo-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;font-size:.73rem;padding:5px 12px;border-radius:20px;cursor:pointer;}
.lo-btn:hover{background:rgba(255,255,255,.15);}

/* TABS */
.tab-bar{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 28px;position:sticky;top:62px;z-index:90;overflow-x:auto;}
.tab-btn{padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--mid);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{color:var(--navy);}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600;}
.tab-btn.t-mgr{color:#9b6e00;}
.tab-btn.t-mgr.active{color:var(--amber);border-bottom-color:var(--gold);}
.tab-btn.t-admin{color:#BF360C;}
.tab-btn.t-admin.active{color:#E65100;border-bottom-color:#FF6D00;}

/* PAGES */
.page{display:none;padding:24px;max-width:980px;margin:0 auto;}
.page.active{display:block;}

/* DATE BAR */
.date-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:18px;flex-wrap:wrap;}
.date-bar label{font-size:.7rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.date-bar input[type=date]{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--charcoal);background:var(--cream);outline:none;cursor:pointer;}
.date-bar input[type=date]:focus{border-color:var(--gold);}
.date-disp{font-size:.87rem;font-weight:600;color:var(--navy);flex:1;}
.d-nav button{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-family:'DM Sans',sans-serif;font-size:.73rem;cursor:pointer;margin-left:4px;}
.d-nav button:hover{background:var(--cream);color:var(--navy);}
.today-btn{background:var(--navy)!important;color:var(--gold)!important;border-color:var(--navy)!important;}

/* OV CARDS */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:18px;}
.ov-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;border-top:3px solid var(--gold);}
.ov-num{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:var(--navy);line-height:1;}
.ov-lbl{font-size:.67rem;color:var(--mid);margin-top:4px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;}

/* PROGRESS */
.prog-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:18px;}
.prog-top{display:flex;justify-content:space-between;font-size:.8rem;font-weight:600;color:var(--navy);margin-bottom:7px;}
.prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s;}
.prog-sub{font-size:.7rem;color:var(--mid);margin-top:5px;}

/* TASKS (employee view) */
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--navy);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.task-card{background:var(--white);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;}
.task-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.05);}
.task-row{display:flex;align-items:center;gap:11px;padding:11px 15px;cursor:pointer;user-select:none;}
.task-row.done-row{background:#fdfdf7;}
.chk{width:19px;height:19px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;background:var(--white);}
.chk.done{background:var(--green);border-color:var(--green);}
.chk.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px);display:block;}
.ttext{font-size:.87rem;color:var(--charcoal);flex:1;line-height:1.4;}
.ttext.x{text-decoration:line-through;color:#bbb;}
.done-time{font-size:.68rem;color:var(--green);font-weight:500;white-space:nowrap;}
.freq-tag{font-size:.64rem;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.f-daily{background:var(--green-bg);color:var(--green);}
.f-weekly{background:var(--blue-bg);color:var(--blue);}
.f-monthly{background:var(--amber-bg);color:var(--amber);}
.f-yearly{background:var(--purple-bg);color:var(--purple);}
.f-once{background:#f0e8fb;color:#5a2d82;}
.empty-state{text-align:center;padding:32px 20px;color:var(--mid);font-size:.86rem;}

/* EMP BLOCKS (manager/admin view) */
.emp-block{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.emp-block-head{display:flex;align-items:center;gap:12px;padding:13px 18px;background:#fdfbf8;border-bottom:1px solid var(--border);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.emp-n{font-size:.9rem;font-weight:600;color:var(--navy);}
.emp-m{font-size:.72rem;color:var(--mid);margin-top:1px;}
.btn-row{display:flex;gap:5px;margin-left:auto;flex-shrink:0;}
.bx{font-size:.7rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;}
.bx:hover{background:var(--cream);}
.bx-save{border-color:#b5d4a0;color:var(--green);}
.bx-save:hover{background:var(--green-bg);}
.bx-danger{border-color:#f0b8b8;color:var(--red);}
.bx-danger:hover{background:var(--red-bg);}
.edit-fields{flex:1;display:flex;flex-direction:column;gap:5px;}
.edit-fields input,.edit-fields select{padding:5px 9px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--charcoal);background:var(--cream);outline:none;}
.edit-fields input:focus{border-color:var(--gold);background:var(--white);}
.edit-sub{display:flex;gap:5px;}
.edit-sub select,.edit-sub input{flex:1;}

/* TASK TABLE */
.tasks-section{padding:14px 18px;}
.tasks-two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:640px){.tasks-two-col{grid-template-columns:1fr;}}
.task-col-title{font-size:.69rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.t-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.t-table th{font-size:.64rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;padding:4px 5px;border-bottom:1px solid var(--border);text-align:left;}
.t-table td{padding:6px 5px;border-bottom:1px solid var(--border);font-size:.79rem;vertical-align:middle;}
.t-table tr:last-child td{border-bottom:none;}
.t-table tr:hover td{background:#fdfbf8;}
.done-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.done-dot.g{background:var(--green);}
.done-dot.e{background:#ddd;}
.sched-note{font-size:.62rem;color:var(--amber);margin-top:1px;font-weight:500;}

/* INLINE EDIT (admin only) */
.task-edit-row td{padding:7px 5px;background:#fffdf5;}
.tei{width:100%;padding:5px 8px;border:1px solid var(--gold);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.79rem;color:var(--charcoal);background:var(--white);outline:none;}
.tes{padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.77rem;color:var(--charcoal);background:var(--white);outline:none;}
.ted{padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.77rem;color:var(--charcoal);background:var(--white);outline:none;width:130px;}
.save-tb{padding:4px 10px;border-radius:16px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);font-family:'DM Sans',sans-serif;font-size:.71rem;cursor:pointer;font-weight:600;}
.cancel-tb{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-family:'DM Sans',sans-serif;font-size:.71rem;cursor:pointer;}
.del-tb{background:none;border:none;color:#ddd;font-size:14px;padding:1px 4px;border-radius:4px;cursor:pointer;}
.del-tb:hover{background:var(--red-bg);color:var(--red);}
.edit-tb{background:none;border:none;color:#bbb;font-size:.7rem;padding:2px 6px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.edit-tb:hover{background:var(--blue-bg);color:var(--blue);}

/* ADD TASK ROW */
.add-task-row{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border);}
.add-task-row input{flex:1;min-width:110px;padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.79rem;color:var(--charcoal);background:var(--cream);outline:none;}
.add-task-row input:focus{border-color:var(--gold);background:var(--white);}
.add-task-row input[type=date]{flex:none;width:136px;}
.add-task-row select{padding:6px 7px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.77rem;color:var(--charcoal);background:var(--cream);outline:none;}
.add-task-row button{padding:6px 12px;border-radius:8px;border:1px solid var(--navy);background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:600;cursor:pointer;}

/* MGMT BOX */
.mgmt-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.mgmt-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--navy);margin-bottom:13px;}
.ae-row{display:flex;gap:8px;flex-wrap:wrap;}
.ae-row input,.ae-row select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--charcoal);background:var(--cream);outline:none;}
.ae-row input:focus{border-color:var(--gold);background:var(--white);}
.ae-row input{flex:1;min-width:110px;}
.ae-row button{padding:8px 14px;border-radius:8px;border:1px solid var(--navy);background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}
.ae-row button:hover{background:#1a2e42;}

/* PERF */
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;}
.perf-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;}
.perf-top{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.perf-score{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--navy);line-height:1;}
.grade-pill{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;margin-top:3px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:.7rem;color:var(--mid);margin-bottom:3px;}
.bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.month-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.month-row label{font-size:.82rem;color:var(--mid);font-weight:500;}
.month-row select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--charcoal);background:var(--white);outline:none;}

/* ACCESS DENIED */
.access-denied{background:var(--red-bg);border:1px solid #f0b8b8;border-radius:12px;padding:20px 24px;color:var(--red);font-size:.88rem;font-weight:500;margin-bottom:16px;}

/* ADMIN PANEL HEADER */
.admin-header{background:#FFF3E0;border:1px solid #FFCC80;border-radius:12px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:.83rem;color:#BF360C;font-weight:500;}

#toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:var(--gold-light);padding:10px 18px;border-radius:10px;font-size:.81rem;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateY(0);}
@media(max-width:600px){nav{padding:0 12px;}.tab-bar{padding:0 6px;}.page{padding:12px 10px;}.login-box{padding:26px 16px;margin:12px;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">PAL <span style="color:var(--mid);font-weight:400">MENS WEAR</span></div>
    <div class="login-sub">Staff Portal</div>
    <div class="role-legend">
      <span class="rl-badge rl-admin">Admin — Full control</span>
      <span class="rl-badge rl-mgr">Manager — Add tasks + Review</span>
      <span class="rl-badge rl-staff">Staff — Own tasks only</span>
    </div>
    <label class="ll">Select your name</label>
    <select class="lsel" id="empSel" onchange="onEmpChange()">
      <option value="">-- Select employee --</option>
    </select>
    <label class="ll">Enter your PIN</label>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <input class="lpin" type="password" id="pinInp" maxlength="4" placeholder="4-digit PIN"
      oninput="onPinInput()" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="lbtn" onclick="doLogin()">Sign In</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <nav>
    <div class="nav-logo">PAL <span>MENS WEAR</span></div>
    <div class="nav-right">
      <div style="text-align:right">
        <div class="nav-name" id="navName"></div>
        <div class="nav-sub" id="navSub"></div>
      </div>
      <div class="nav-av" id="navAv"></div>
      <div class="role-chip" id="roleChip"></div>
      <button class="lo-btn" onclick="doLogout()">Sign out</button>
    </div>
  </nav>
  <div class="tab-bar" id="tabBar"></div>
  <div id="myChecklist"  class="page active"></div>
  <div id="myDelegation" class="page"></div>
  <div id="mgrAddTasks"  class="page"></div>
  <div id="mgrPerf"      class="page"></div>
  <div id="adminManage"  class="page"></div>
  <div id="adminStaff"   class="page"></div>
</div>
<div id="toast"></div>

<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const AVC=[
  {bg:'#E6F1FB',cl:'#0C447C'},{bg:'#E1F5EE',cl:'#085041'},
  {bg:'#FAEEDA',cl:'#633806'},{bg:'#EEEDFE',cl:'#3C3489'},
  {bg:'#FAECE7',cl:'#712B13'},{bg:'#EAF3DE',cl:'#27500A'},
  {bg:'#FBEAF0',cl:'#72243E'},{bg:'#F1EFE8',cl:'#5F5E5A'}
];

// ROLES: 'admin' | 'manager' | 'staff'
let employees=[
  {id:0,name:'Admin',role:'Owner',shift:'Full Day',pin:'0000',access:'admin'},
  {id:1,name:'Manpreet Singh',role:'Store Manager',shift:'Full Day',pin:'1111',access:'manager'},
  {id:2,name:'Rohit Kumar',role:'Sales Staff',shift:'Morning',pin:'2222',access:'staff'},
  {id:3,name:'Pankaj Sharma',role:'Cashier',shift:'Full Day',pin:'3333',access:'staff'},
  {id:4,name:'Anil Verma',role:'Sales Staff',shift:'Evening',pin:'4444',access:'staff'},
  {id:5,name:'Raj Tailor',role:'Tailor',shift:'Full Day',pin:'5555',access:'staff'},
];

let checklist={
  1:[
    {id:1,text:'Open store & disable alarm',freq:'daily',done:false,doneAt:'',schedDate:''},
    {id:2,text:'Check WhatsApp orders & messages',freq:'daily',done:false,doneAt:'',schedDate:''},
    {id:3,text:'Review previous day sales report',freq:'daily',done:false,doneAt:'',schedDate:''},
    {id:4,text:'Approve discounts above 10%',freq:'daily',done:false,doneAt:'',schedDate:''},
    {id:5,text:'Lock store & set alarm at closing',freq:'daily',done:false,doneAt:'',schedDate:''},
    {id:6,text:'Staff briefing & weekly targets',freq:'weekly',done:false,doneAt:'',schedDate:'2026-03-23'},
    {id:7,text:'Reorder stock from suppliers',freq:'weekly',done:false,doneAt:'',schedDate:'2026-03-23'},
    {id:8,text:'Monthly P&L review',freq:'monthly',done:false,doneAt:'',schedDate:'2026-03-01'},
    {id:9,text:'Process staff salaries',freq:'monthly',done:false,doneAt:'',schedDate:'2026-03-01'},
  ],
  2:[

/* ── HELPERS ── */
function fmtDate(d){return d.toISOString().split('T')[0];}
function fmtDisp(d){return DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function shiftDay(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function timeNow(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
function avC(emp){const i=employees.indexOf(emp)%AVC.length;return AVC[i<0?0:i];}
function avEl(emp,sz){
  const c=avC(emp);
  const ini=emp.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  return `<div class="av" style="width:${sz}px;height:${sz}px;background:${c.bg};color:${c.cl};font-size:${sz>32?12:10}px">${ini}</div>`;
}
function freqTag(f){
  const m={daily:'f-daily Daily',weekly:'f-weekly Weekly',monthly:'f-monthly Monthly',yearly:'f-yearly Yearly',once:'f-once Once'};
  const p=(m[f]||'f-once '+f).split(' ');
  return `<span class="freq-tag ${p[0]}">${p.slice(1).join(' ')}</span>`;
}
function schedDisp(t){
  if(!t.schedDate||t.freq==='daily'||t.freq==='once')return '';
  const d=new Date(t.schedDate+'T00:00:00');
  if(t.freq==='weekly')return `Every ${DAYS[d.getDay()]} from ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  if(t.freq==='monthly')return `Every ${d.getDate()} of the month`;
  if(t.freq==='yearly')return `Every ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  return '';
}
function freqHint(f){
  if(f==='weekly')return 'Pick start day of the week';
  if(f==='monthly')return 'Pick date it repeats monthly';
  if(f==='yearly')return 'Pick date it repeats yearly';
  return '';
}
function getPct(list){if(!list||!list.length)return 0;return Math.round(list.filter(t=>t.done).length/list.length*100);}
function getScore(id){return Math.round((getPct(checklist[id]||[])+getPct(delegation[id]||[]))/2);}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function isAdmin(){return currentUser&&currentUser.access==='admin';}
function isManager(){return currentUser&&currentUser.access==='manager';}
function isStaff(){return currentUser&&currentUser.access==='staff';}

function updateDots(n){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot'+(i<n?' f':'');}
function doLogin(){
  const empId=parseInt(document.getElementById('empSel').value);
  const pin=document.getElementById('pinInp').value.trim();
  const err=document.getElementById('loginErr');
  if(isNaN(empId)){err.textContent='Please select your name.';return;}
  if(pin.length!==4){err.textContent='PIN must be 4 digits.';return;}
  const emp=employees.find(e=>e.id===empId);
  if(!emp||emp.pin!==pin){err.textContent='Wrong PIN. Try again.';document.getElementById('pinInp').value='';updateDots(0);return;}
  currentUser=emp;err.textContent='';showApp();
}

  currentUser=null;

  document.getElementById('empSel').value='';
  updateDots(0);
  document.getElementById('loginErr').textContent='';
  document.getElementById('loginScreen').classList.add('active');

/* ── SHARED: TASK VIEW ── */
function buildTaskView(list,type,pageId,color){
  const groups={daily:[],weekly:[],monthly:[],yearly:[],once:[]};
  list.forEach(t=>{if(groups[t.freq])groups[t.freq].push(t);else groups.daily.push(t);});
  const labels={daily:'Daily tasks',weekly:'Weekly tasks',monthly:'Monthly tasks',yearly:'Yearly tasks',once:'One-time tasks'};
  let html='';
  Object.entries(groups).forEach(([freq,items])=>{
    if(!items.length)return;
    html+=`<div class="sec-title">${labels[freq]}</div>`;
    items.forEach(t=>{
      const sd=schedDisp(t);
      html+=`<div class="task-card"><div class="task-row${t.done?' done-row':''}" onclick="toggleTask('${type}',${currentUser.id},${t.id},'${pageId}')">
        <div class="chk${t.done?' done':''}" id="${type}_chk_${currentUser.id}_${t.id}"></div>
        <div class="ttext${t.done?' x':''}" id="${type}_txt_${currentUser.id}_${t.id}">
          ${t.text}
          ${sd?`<div style="font-size:.64rem;color:var(--amber);margin-top:2px;font-weight:500">&#128197; ${sd}</div>`:''}
        </div>
        ${freqTag(t.freq)}
        ${t.done&&t.doneAt?`<span class="done-time">&#10003; ${t.doneAt}</span>`:''}
      </div></div>`;
    });
  });
  return html||`<div class="empty-state">No tasks assigned yet.</div>`;
}

function toggleTask(type,empId,taskId,pageId){
  const data=type==='checklist'?checklist:delegation;
  const t=(data[empId]||[]).find(t=>t.id===taskId);
  if(!t)return;
  t.done=!t.done;t.doneAt=t.done?timeNow():'';
  if(pageId==='myChecklist')renderMyChecklist();
  else renderMyDelegation();
  toast(t.done?'Task marked done!':'Task unmarked');
}

function buildMgrAddCol(list,type,empId,prefix){
  const title=type==='checklist'?'Checklist Tasks':'Delegation Tasks';
  let rows=list.map(t=>{
    const sd=schedDisp(t);
    return `<div style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.79rem">
      <div class="done-dot ${t.done?'g':'e'}"></div>
      <span style="flex:1">${t.text}${sd?`<div class="sched-note">&#128197; ${sd}</div>`:''}</span>
      ${freqTag(t.freq)}
    </div>`;
  }).join('');
  if(!list.length)rows=`<div style="font-size:.76rem;color:var(--mid);padding:6px 0">No tasks yet</div>`;

  const showSchedId=`${prefix}_msd_${empId}`;
  const hintId=`${prefix}_mhint_${empId}`;
  return `<div>
    <div class="task-col-title">${title}</div>
    <div>${rows}</div>
    <div class="add-task-row" style="margin-top:8px">
      <input type="text" id="${prefix}_minp_${empId}" placeholder="Add task..."/>
      <select id="${prefix}_mfrq_${empId}" onchange="mgrToggleSched('${prefix}',${empId})">
        ${type==='delegation'?'<option value="once">Once</option>':''}
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
      <input type="date" id="${showSchedId}" style="display:none" title="Schedule date"/>
      <button onclick="mgrAddTask('${type}',${empId},'${prefix}')">+ Add</button>
    </div>
    <div id="${hintId}" style="font-size:.63rem;color:var(--amber);margin-top:3px;display:none"></div>
  </div>`;
}

function mgrToggleSched(prefix,empId){
  const frq=document.getElementById(`${prefix}_mfrq_${empId}`).value;
  const sd=document.getElementById(`${prefix}_msd_${empId}`);
  const hint=document.getElementById(`${prefix}_mhint_${empId}`);
  const show=(frq==='weekly'||frq==='monthly'||frq==='yearly');
  if(sd)sd.style.display=show?'block':'none';
  if(hint){hint.textContent=freqHint(frq);hint.style.display=show?'block':'none';}
}

function mgrAddTask(type,empId,prefix){
  const data=type==='checklist'?checklist:delegation;
  const inp=document.getElementById(`${prefix}_minp_${empId}`);
  const frq=document.getElementById(`${prefix}_mfrq_${empId}`);
  const sd=document.getElementById(`${prefix}_msd_${empId}`);
  if(!inp||!inp.value.trim())return;
  const freq=frq.value;
  const schedDate=(freq==='daily'||freq==='once')?'':(sd?sd.value:'');
  if(!data[empId])data[empId]=[];
  data[empId].push({id:nextTid++,text:inp.value.trim(),freq,done:false,doneAt:'',schedDate});
  inp.value='';if(sd)sd.value='';
  renderMgrAddTasks();toast('Task added by Manager');
}

  const top=scores.length?scores.reduce((a,s)=>s.score>a.score?s:a,scores[0]):null;
  const onTrack=scores.filter(s=>s.score>=70).length;
  let html=`<div class="month-row"><label>Month:</label><select onchange="selMonth=parseInt(this.value);renderMgrPerf()">`;

    html+=`<div class="perf-card">

      </div>
      <div class="bar-lbl"><span>Checklist (${cl.filter(t=>t.done).length}/${cl.length})</span><span>${clP}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${clP}%;background:#3B6D11"></div></div>
      <div class="bar-lbl"><span>Delegation (${dl.filter(t=>t.done).length}/${dl.length})</span><span>${dlP}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${dlP}%;background:#534AB7"></div></div>
    </div>`;
  });
  document.getElementById('mgrPerf').innerHTML=html+'</div>';
}

/* ── ADMIN: MANAGE TASKS (edit + delete + add) ── */
function renderAdminManage(){
  const staffEmps=employees.filter(e=>e.access!=='admin');
  let html=`<div class="admin-header">&#9881; Admin — Full task control. You can add, edit and delete tasks for all staff.</div>`;
  staffEmps.forEach(emp=>{
    const cl=checklist[emp.id]||[];
    const dl=delegation[emp.id]||[];
    html+=`<div class="emp-block">
      <div class="emp-block-head">
        ${avEl(emp,36)}
        <div style="flex:1"><div class="emp-n">${emp.name}</div>
        <div class="emp-m">${emp.role} · ${emp.shift} · PIN: ${emp.pin}</div></div>
      </div>
      <div class="tasks-section">
        <div class="tasks-two-col">
          ${buildAdminTaskCol(cl,'checklist',emp.id,'cl')}
          ${buildAdminTaskCol(dl,'delegation',emp.id,'dl')}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('adminManage').innerHTML=html;
}

function buildAdminTaskCol(list,type,empId,prefix){
  const title=type==='checklist'?'Checklist Tasks':'Delegation Tasks';
  const et=editingTask;
  let rows='';
  list.forEach(t=>{
    const isEt=et&&et.type===type&&et.empId===empId&&et.taskId===t.id;
    const sd=schedDisp(t);
    if(isEt){
      const needSched=(t.freq==='weekly'||t.freq==='monthly'||t.freq==='yearly');
      rows+=`<tr class="task-edit-row">
        <td colspan="5">
          <div style="display:flex;flex-direction:column;gap:6px">
            <input class="tei" id="et_text" value="${t.text}"/>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <select class="tes" id="et_freq" onchange="onAdminFreqChange()">
                <option value="daily"${t.freq==='daily'?' selected':''}>Daily</option>
                <option value="weekly"${t.freq==='weekly'?' selected':''}>Weekly</option>
                <option value="monthly"${t.freq==='monthly'?' selected':''}>Monthly</option>
                <option value="yearly"${t.freq==='yearly'?' selected':''}>Yearly</option>
                <option value="once"${t.freq==='once'?' selected':''}>Once</option>
              </select>
              <input type="date" class="ted" id="et_sched" value="${t.schedDate||''}" style="display:${needSched?'block':'none'}"/>
              <span id="et_hint" style="font-size:.63rem;color:var(--amber);display:${needSched?'inline':'none'}">${freqHint(t.freq)}</span>
              <button class="save-tb" onclick="saveTaskEdit('${type}',${empId},${t.id})">Save</button>
              <button class="cancel-tb" onclick="editingTask=null;renderAdminManage()">Cancel</button>
            </div>
          </div>
        </td>
      </tr>`;
    } else {
      rows+=`<tr>
        <td><div class="done-dot ${t.done?'g':'e'}"></div></td>
        <td style="max-width:190px">${t.text}${sd?`<div class="sched-note">&#128197; ${sd}</div>`:''}</td>
        <td>${freqTag(t.freq)}</td>
        <td style="font-size:.67rem;color:${t.done?'var(--green)':'#ccc'}">${t.done?'&#10003; '+t.doneAt:'—'}</td>
        <td style="white-space:nowrap">
          <button class="edit-tb" onclick="startEditTask('${type}',${empId},${t.id})">Edit</button>
          <button class="del-tb" onclick="adminDelTask('${type}',${empId},${t.id})">&#215;</button>
        </td>
      </tr>`;
    }
  });

  return `<div>
    <div class="task-col-title">${title}</div>
    <table class="t-table">
      <thead><tr><th style="width:16px"></th><th>Task</th><th style="width:75px">Freq</th><th style="width:65px">Done</th><th style="width:55px"></th></tr></thead>
      <tbody>${rows}${!list.length?'<tr><td colspan="5" style="font-size:.75rem;color:var(--mid);padding:7px 5px">No tasks yet</td></tr>':''}</tbody>
    </table>
    <div class="add-task-row">
      <input type="text" id="${prefix}_ainp_${empId}" placeholder="Add task..."/>
      <select id="${prefix}_afrq_${empId}" onchange="adminToggleSched('${prefix}',${empId})">
        ${type==='delegation'?'<option value="once">Once</option>':''}
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
      <input type="date" id="${prefix}_asd_${empId}" style="display:none"/>
      <button onclick="adminAddTask('${type}',${empId},'${prefix}')">+ Add</button>
    </div>
    <div id="${prefix}_ahint_${empId}" style="font-size:.63rem;color:var(--amber);margin-top:3px;display:none"></div>
  </div>`;
}

function onAdminFreqChange(){
  const f=document.getElementById('et_freq').value;
  const sd=document.getElementById('et_sched');
  const hint=document.getElementById('et_hint');
  const show=(f==='weekly'||f==='monthly'||f==='yearly');
  if(sd)sd.style.display=show?'block':'none';
  if(hint){hint.textContent=freqHint(f);hint.style.display=show?'inline':'none';}
}
function startEditTask(type,empId,taskId){editingTask={type,empId,taskId};renderAdminManage();}
function saveTaskEdit(type,empId,taskId){
  const data=type==='checklist'?checklist:delegation;
  const t=(data[empId]||[]).find(t=>t.id===taskId);
  if(!t)return;
  const text=document.getElementById('et_text').value.trim();
  const freq=document.getElementById('et_freq').value;
  const sched=document.getElementById('et_sched').value;
  if(!text){toast('Task name cannot be empty');return;}
  t.text=text;t.freq=freq;
  t.schedDate=(freq==='daily'||freq==='once')?'':sched;
  editingTask=null;renderAdminManage();toast('Task updated');
}
function adminToggleSched(prefix,empId){
  const f=document.getElementById(`${prefix}_afrq_${empId}`).value;
  const sd=document.getElementById(`${prefix}_asd_${empId}`);
  const hint=document.getElementById(`${prefix}_ahint_${empId}`);
  const show=(f==='weekly'||f==='monthly'||f==='yearly');
  if(sd)sd.style.display=show?'block':'none';
  if(hint){hint.textContent=freqHint(f);hint.style.display=show?'block':'none';}
}
function adminAddTask(type,empId,prefix){
  const data=type==='checklist'?checklist:delegation;
  const inp=document.getElementById(`${prefix}_ainp_${empId}`);
  const frq=document.getElementById(`${prefix}_afrq_${empId}`);
  const sd=document.getElementById(`${prefix}_asd_${empId}`);
  if(!inp||!inp.value.trim())return;
  const freq=frq.value;
  const schedDate=(freq==='daily'||freq==='once')?'':(sd?sd.value:'');
  if(!data[empId])data[empId]=[];
  data[empId].push({id:nextTid++,text:inp.value.trim(),freq,done:false,doneAt:'',schedDate});
  inp.value='';if(sd)sd.value='';
  renderAdminManage();toast('Task added');
}
function adminDelTask(type,empId,taskId){
  if(!confirm('Delete this task permanently?'))return;
  const data=type==='checklist'?checklist:delegation;
  if(data[empId])data[empId]=data[empId].filter(t=>t.id!==taskId);
  if(editingTask&&editingTask.type===type&&editingTask.empId===empId&&editingTask.taskId===taskId)editingTask=null;
  renderAdminManage();toast('Task deleted');
}

/* ── ADMIN: MANAGE STAFF ── */
function renderAdminStaff(){
  let rows='';
  employees.forEach(emp=>{
    const isEdit=editingEmp===emp.id;
    rows+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)">
      ${avEl(emp,34)}
      ${isEdit?`<div class="edit-fields">
        <input id="en_${emp.id}" value="${emp.name}" placeholder="Full name"/>
        <div class="edit-sub">
          <input id="er_${emp.id}" value="${emp.role}" placeholder="Role"/>
          <select id="es_${emp.id}">
            <option${emp.shift==='Full Day'?' selected':''}>Full Day</option>
            <option${emp.shift==='Morning'?' selected':''}>Morning</option>
            <option${emp.shift==='Evening'?' selected':''}>Evening</option>
          </select>
        </div>
        <div class="edit-sub">
          <input id="ep_${emp.id}" value="${emp.pin}" maxlength="4" placeholder="4-digit PIN" style="letter-spacing:4px"/>
          <select id="ea_${emp.id}">
            <option value="staff"${emp.access==='staff'?' selected':''}>Staff</option>
            <option value="manager"${emp.access==='manager'?' selected':''}>Manager</option>
            <option value="admin"${emp.access==='admin'?' selected':''}>Admin</option>
          </select>
        </div>
      </div>`
      :`<div style="flex:1">
          <div style="font-size:.88rem;font-weight:600;color:var(--navy)">${emp.name}</div>
          <div style="font-size:.72rem;color:var(--mid)">${emp.role} · ${emp.shift} · PIN: ${emp.pin} · <span style="font-weight:600;color:${emp.access==='admin'?'#E65100':emp.access==='manager'?'var(--amber)':'var(--blue)'}">${emp.access.charAt(0).toUpperCase()+emp.access.slice(1)}</span></div>
        </div>`}
      <div class="btn-row">
        ${isEdit
          ?`<button class="bx bx-save" onclick="saveEmp(${emp.id})">Save</button>
            <button class="bx" onclick="editingEmp=null;renderAdminStaff()">Cancel</button>`
          :`<button class="bx" onclick="editingEmp=${emp.id};renderAdminStaff()">Edit</button>`}
        ${emp.id!==currentUser.id?`<button class="bx bx-danger" onclick="removeEmp(${emp.id})">Remove</button>`:''}
      </div>
    </div>`;
  });

  document.getElementById('adminStaff').innerHTML=`
    <div class="admin-header">&#9881; Admin — Add, edit or remove staff members and set their access level.</div>
    <div class="mgmt-box">
      <div class="mgmt-title">Add new staff member</div>
      <div class="ae-row">
        <input type="text" id="new_name" placeholder="Full name..."/>
        <input type="text" id="new_role" placeholder="Role (e.g. Cashier)"/>
        <select id="new_shift">
          <option>Full Day</option><option>Morning</option><option>Evening</option>
        </select>
        <input type="text" id="new_pin" maxlength="4" placeholder="4-digit PIN" style="max-width:100px;letter-spacing:3px"/>
        <select id="new_access">
          <option value="staff">Staff</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
        <button onclick="addEmp()">+ Add</button>
      </div>
    </div>
    <div class="mgmt-box">
      <div class="mgmt-title">All staff — ${employees.length} members</div>
      <div>${rows}</div>
    </div>`;
}

function addEmp(){
  const name=document.getElementById('new_name').value.trim();
  const pin=document.getElementById('new_pin').value.trim();
  if(!name){toast('Enter a name');return;}
  if(pin.length!==4||isNaN(pin)){toast('PIN must be 4 digits');return;}
  const role=document.getElementById('new_role').value||'Staff';
  const shift=document.getElementById('new_shift').value;
  const access=document.getElementById('new_access').value;
  const emp={id:nextEmpId++,name,role,shift,pin,access};
  employees.push(emp);checklist[emp.id]=[];delegation[emp.id]=[];
  document.getElementById('new_name').value='';document.getElementById('new_pin').value='';document.getElementById('new_role').value='';
  populateSelect();renderAdminStaff();toast(name+' added');
}
function removeEmp(id){
  if(!confirm('Remove this staff member and all their tasks?'))return;
  const emp=employees.find(e=>e.id===id);
  employees=employees.filter(e=>e.id!==id);
  delete checklist[id];delete delegation[id];
  editingEmp=null;editingTask=null;
  populateSelect();renderAdminStaff();toast((emp?emp.name:'Staff')+' removed');
}
function saveEmp(id){
  const emp=employees.find(e=>e.id===id);if(!emp)return;
  const pin=document.getElementById(`ep_${id}`).value.trim();
  if(pin.length!==4||isNaN(pin)){toast('PIN must be 4 digits');return;}
  emp.name=document.getElementById(`en_${id}`).value.trim()||emp.name;
  emp.role=document.getElementById(`er_${id}`).value.trim()||emp.role;
  emp.shift=document.getElementById(`es_${id}`).value;
  emp.pin=pin;emp.access=document.getElementById(`ea_${id}`).value;
  editingEmp=null;populateSelect();renderAdminStaff();toast('Updated');
}

populateSelect();
</script>
</body>
</html>
