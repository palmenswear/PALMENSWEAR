function avC(emp) {
  // Deterministic hash from the stable employee key (not reference equality)
  // so colors stay consistent even after employees array is rebuilt
  // and work for object copies like {...emp, _type:'checklist'}
  const k = emp?._key || emp?.name || '';
  let h = 0;
  for (let j = 0; j < k.length; j++) h = (h * 31 + k.charCodeAt(j)) | 0;
  return AVC[Math.abs(h) % AVC.length];
}
function avEl(emp, sz) {

}
function freqTag(f) {

function schedDisp(t) {

  const d = new Date(t.schedDate+'T00:00:00');

  if (t.freq==='yearly')  return `Every ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  return '';
}
function schedTimeDisp(t) {
  if (!t.schedTime) return '';
  return `By ${t.schedTime}`;
}
/* Build a clean "Scheduled vs Actual" time comparison block for a task */
function schedVsActual(t, status, isDoneForDate, viewDate, empKey, type) {
  const hasSched = !!t.schedTime;
  // Get the correct doneAt for the specific viewed date (from completions store)
  const doneAtForDate = (viewDate && empKey && type) ? getDoneAtForDate(t, viewDate, empKey, type) : (isDoneForDate ? t.doneAt : '');
  const hasDone = !!doneAtForDate;
  if (!hasSched && !hasDone) return '';

  let diff = '';
  if (hasSched && hasDone) {
    const sMin = parseTimeToMinutes(t.schedTime);
    const dMin = parseTimeToMinutes(doneAtForDate);
    if (sMin >= 0 && dMin >= 0) {
      const delta = dMin - sMin;
      if (delta <= 0) {
        const early = Math.abs(delta);
        const h = Math.floor(early / 60), m = early % 60;
        diff = early === 0
          ? `<span class="sva-diff sva-ontime">&#10003; Exactly on time</span>`
          : `<span class="sva-diff sva-ontime">&#10003; ${h>0?h+'h ':''}${m}m early</span>`;
      } else {
        const h = Math.floor(delta / 60), m = delta % 60;
        diff = `<span class="sva-diff sva-late">&#9888; ${h>0?h+'h ':''}${m}m late</span>`;
      }
    }
  }

  const schedCell = hasSched
    ? `<div class="sva-cell"><div class="sva-lbl">SCHEDULED BY</div><div class="sva-val sva-sched">${fmtTimeDisp(t.schedTime)}</div></div>`
    : `<div class="sva-cell"><div class="sva-lbl">SCHEDULED BY</div><div class="sva-val sva-none">No time set</div></div>`;

  let actualCell = '';
  if (hasDone) {
    const isLate = status === 'done-late';
    actualCell = `<div class="sva-cell"><div class="sva-lbl">ACTUAL TIME</div><div class="sva-val ${isLate?'sva-actual-late':'sva-actual-ok'}">${fmtTimeDisp(doneAtForDate)}</div></div>`;
  } else if (status === 'missed') {
    actualCell = `<div class="sva-cell"><div class="sva-lbl">ACTUAL TIME</div><div class="sva-val sva-missed">Not done</div></div>`;
  } else {
    actualCell = `<div class="sva-cell"><div class="sva-lbl">ACTUAL TIME</div><div class="sva-val sva-none">—</div></div>`;
  }

  return `<div class="sva-box">
    <div class="sva-grid">${schedCell}<div class="sva-arrow">&rarr;</div>${actualCell}</div>
    ${diff}
  </div>`;
}
function parseTimeToMinutes(timeStr) {
  // Handles '09:30' (24hr), '09:30 AM', '01:08 pm', '09:30\u202fAM' (narrow NBSP)
  if (!timeStr) return -1;
  // Normalize: uppercase, replace narrow NBSP and regular NBSP with space, collapse spaces
  const s = String(timeStr).toUpperCase().replace(/[\u202F\u00A0]/g, ' ').trim();
  let hours = 0, mins = 0;
  if (s.includes('AM') || s.includes('PM')) {
    // 12-hour format
    const cleaned = s.replace(/AM|PM/g, '').trim();
    const parts = cleaned.split(':');
    hours = parseInt(parts[0], 10);
    mins  = parseInt(parts[1], 10);
    if (isNaN(hours) || isNaN(mins)) return -1;
    if (s.includes('PM') && hours !== 12) hours += 12;
    if (s.includes('AM') && hours === 12) hours = 0;
  } else {
    // 24-hour format
    const parts = s.split(':');
    hours = parseInt(parts[0], 10);
    mins  = parseInt(parts[1], 10);
    if (isNaN(hours) || isNaN(mins)) return -1;
  }
  return hours * 60 + mins;
}
/* Format any time string (12h or 24h) into consistent display format "hh:mm AM/PM" */
function fmtTimeDisp(timeStr) {
  if (!timeStr) return '';
  const mins = parseTimeToMinutes(timeStr);
  if (mins < 0) return timeStr; // fallback to raw if unparseable
  const h24 = Math.floor(mins / 60);
  const m = mins % 60;
  const suffix = h24 >= 12 ? 'PM' : 'AM';
  let h12 = h24 % 12; if (h12 === 0) h12 = 12;
  return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${suffix}`;
}
function getTaskStatus(t, viewDate=null, empKey=null, type=null) {
  // Returns: 'done-ontime' | 'done-late' | 'missed' | 'pending'
  const today = fmtDate(new Date());
  const viewStr = viewDate ? fmtDate(viewDate) : today;

  // Look up completion record for this specific date (new per-date storage)
  let comp = null;
  if (empKey && type && t._key) {
    comp = getCompletion(empKey, type, t._key, viewStr);
  }
  // Legacy fallback: if no per-date record but the old done/doneDate matches viewStr
  const legacyDone = (!comp) && t.done && t.doneDate === viewStr;

  // For 'once' tasks, completion is date-independent (viewing any date shows the done state)
  if (t.freq === 'once') {
    // Find ANY completion record, or use legacy flag
    let oncComp = comp;
    if (!oncComp && empKey && type && t._key) {
      const allDates = completions?.[empKey]?.[type]?.[t._key];
      if (allDates) {
        const firstKey = Object.keys(allDates)[0];
        if (firstKey) oncComp = allDates[firstKey];
      }
    }
    if (oncComp || t.done) {
      const doneAt = oncComp?.doneAt || t.doneAt;
      if (!t.schedTime || !doneAt) return 'done-ontime';
      const schedMins = parseTimeToMinutes(t.schedTime);
      const doneMins  = parseTimeToMinutes(doneAt);
      if (schedMins < 0 || doneMins < 0) return 'done-ontime';
      return doneMins <= schedMins ? 'done-ontime' : 'done-late';
    }
    return 'pending';
  }

  // For recurring tasks — check completion for the specific view date
  if (comp || legacyDone) {
    const doneAt = comp?.doneAt || t.doneAt;
    if (!t.schedTime || !doneAt) return 'done-ontime';
    const schedMins = parseTimeToMinutes(t.schedTime);
    const doneMins  = parseTimeToMinutes(doneAt);
    if (schedMins < 0 || doneMins < 0) return 'done-ontime';
    return doneMins <= schedMins ? 'done-ontime' : 'done-late';
  }

  // Not done for this viewed date
  // Past date → missed
  if (viewStr < today) return 'missed';

  // Today → check if schedTime has passed
  if (viewStr === today) {
    if (t.schedTime) {
      const now = new Date();
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const schedMins = parseTimeToMinutes(t.schedTime);
      if (schedMins >= 0 && nowMins > schedMins) return 'missed';
    }
  }

  // Future date or today-before-deadline → pending
  return 'pending';
}
function calcPerformanceScore(taskList, filterMonth=null, filterYear=null, viewDate=null, empKey=null, type=null) {
  // NOTE: filterMonth/filterYear params are kept for backwards compat but are
  // no longer used for filtering — per-date accuracy via viewDate + completions
  // store is the source of truth now. The prior implementation used legacy
  // t.doneMonth/doneYear which gave wrong results with the new per-date storage.
  const list = taskList;
  if (!list.length) return {score:100, onTime:0, late:0, missed:0, pending:0, total:0};
  let onTime=0, late=0, missed=0, pending=0;
  list.forEach(t => {
    const s = getTaskStatus(t, viewDate, empKey, type);
    if (s==='done-ontime') onTime++;
    else if (s==='done-late') late++;
    else if (s==='missed') missed++;
    else pending++;
  });
  const total = list.length;
  // Score: on-time=100pts, late=60pts, missed=0pts, pending=80pts
  const score = total ? Math.round((onTime*100 + late*60 + pending*80) / total) : 100;
  return {score, onTime, late, missed, pending, total};
}
/* Check if a recurring task should be visible on a given date */
function isTaskVisibleOnDate(t, viewDate) {
  if (!viewDate) return true;
  const vd = fmtDate(viewDate);
  // 'once' tasks: always visible
  if (t.freq === 'once') return true;
  // 'daily' tasks: always visible
  if (t.freq === 'daily') return true;
  // 'weekly' tasks: visible if same day of week as schedDate
  if (t.freq === 'weekly' && t.schedDate) {
    const sd = new Date(t.schedDate+'T00:00:00');
    return viewDate.getDay() === sd.getDay();
  }
  // 'monthly' tasks: visible if same day of month as schedDate.
  // Edge case: if schedDate day is 31 and the viewed month has fewer days,
  // show on the LAST day of that month instead (so Feb/Apr/etc. still trigger).
  if (t.freq === 'monthly' && t.schedDate) {
    const sd = new Date(t.schedDate+'T00:00:00');
    const schedDay = sd.getDate();
    const vDay = viewDate.getDate();
    if (vDay === schedDay) return true;
    // Last day of viewed month
    const lastDayOfMonth = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
    if (schedDay > lastDayOfMonth && vDay === lastDayOfMonth) return true;
    return false;
  }
  // 'yearly' tasks: visible if same day and month as schedDate.
  // Edge case: Feb 29 in non-leap year → show on Feb 28.
  if (t.freq === 'yearly' && t.schedDate) {
    const sd = new Date(t.schedDate+'T00:00:00');
    if (viewDate.getMonth() !== sd.getMonth()) return false;
    const schedDay = sd.getDate();
    const vDay = viewDate.getDate();
    if (vDay === schedDay) return true;
    const lastDayOfMonth = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
    if (schedDay > lastDayOfMonth && vDay === lastDayOfMonth) return true;
    return false;
  }
  // If no schedDate for weekly/monthly/yearly, show always
  return true;
}

function freqHint(f) {

  if (f==='monthly') return 'Pick the date it repeats monthly';
  if (f==='yearly')  return 'Pick the date it repeats yearly';

}
function getPct(list) {
  if (!list || !list.length) return 0;
  return Math.round(list.filter(t=>t.done).length / list.length * 100);
}
function getScore(id) {
  const cl = Object.values(tasks[id]?.checklist  || {});
  const dl = Object.values(tasks[id]?.delegation || {});
  return Math.round((getPct(cl) + getPct(dl)) / 2);
}

  const snap = await get(ref(db, 'employees'));

    snap.forEach(child => {
      employees.push({ _key: child.key, ...child.val() });
    });
  }
}

let compUnsub = null;
function startLiveSync() {
  if (liveUnsub) liveUnsub();
  if (compUnsub) compUnsub();
  liveUnsub = onValue(ref(db, 'tasks'), snap => {
    tasks = {};
    if (snap.exists()) {
      snap.forEach(empSnap => {
        const empKey = empSnap.key;
        tasks[empKey] = { checklist: {}, delegation: {} };
        empSnap.forEach(typeSnap => {
          const type = typeSnap.key;
          if (type === 'checklist' || type === 'delegation') {
            typeSnap.forEach(taskSnap => {
              tasks[empKey][type][taskSnap.key] = { _key: taskSnap.key, ...taskSnap.val() };
            });
          }
        });
      });
    }
    refreshCurrentPage();
  });
  // Listen to completions — the per-date history
  compUnsub = onValue(ref(db, 'completions'), snap => {
    completions = {};
    if (snap.exists()) {
      snap.forEach(empSnap => {
        const empKey = empSnap.key;
        completions[empKey] = { checklist: {}, delegation: {} };
        empSnap.forEach(typeSnap => {
          const type = typeSnap.key;
          if (type === 'checklist' || type === 'delegation') {
            typeSnap.forEach(taskSnap => {
              completions[empKey][type][taskSnap.key] = {};
              taskSnap.forEach(dateSnap => {
                completions[empKey][type][taskSnap.key][dateSnap.key] = dateSnap.val();
              });
            });
          }
        });
      });
    }
    refreshCurrentPage();
  });
}

/* Get completion record for a task on a specific date, or null */
function getCompletion(empKey, type, taskKey, dateStr) {
  return completions?.[empKey]?.[type]?.[taskKey]?.[dateStr] || null;
}

/* Get the actual done time for a task on a given view date (from completions, with legacy fallback) */
function getDoneAtForDate(t, viewDate, empKey, type) {
  if (!viewDate) return '';
  const vd = fmtDate(viewDate);
  // For 'once' tasks, any completion counts
  if (t.freq === 'once') {
    if (empKey && type && t._key) {
      const allDates = completions?.[empKey]?.[type]?.[t._key];
      if (allDates) {
        const firstKey = Object.keys(allDates)[0];
        if (firstKey && allDates[firstKey]?.doneAt) return allDates[firstKey].doneAt;
      }
    }
    return t.doneAt || '';
  }
  // For recurring — look up the exact date
  const comp = empKey && type && t._key ? getCompletion(empKey, type, t._key, vd) : null;
  if (comp?.doneAt) return comp.doneAt;
  // Legacy fallback
  if (t.done && t.doneDate === vd) return t.doneAt || '';
  return '';
}

function refreshCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id;
  if (id==='myChecklist')   renderMyChecklist();
  else if (id==='myDelegation') renderMyDelegation();
  else if (id==='mgrAddTasks') renderMgrAddTasks();
  else if (id==='mgrPerf')    renderMgrPerf();
  else if (id==='adminManage') renderAdminManage();
  else if (id==='adminStaff') renderAdminStaff();
  else if (id==='weeklyReports') renderWeeklyReports();
}

/* ═══════════ TOGGLE TASK (Firebase write) ═══════════ */
window.toggleTask = async (type, empKey, taskKey) => {
  const t = tasks[empKey]?.[type]?.[taskKey];
  if (!t) return;
  const fn = fullNow();
  const todayStr = fn.date;
  // Check today's completion record
  const existing = getCompletion(empKey, type, taskKey, todayStr);
  const willMarkDone = !existing; // toggle: if no record for today → mark done; if exists → unmark
  if (willMarkDone) {
    // Write new completion record for today
    await set(ref(db, `completions/${empKey}/${type}/${taskKey}/${todayStr}`), {
      doneAt: fn.time,
      timestamp: Date.now()
    });
    // Also update legacy fields for backwards compatibility with old data
    await update(ref(db, `tasks/${empKey}/${type}/${taskKey}`), {
      done: true, doneAt: fn.time, doneDate: todayStr, doneMonth: fn.month, doneYear: fn.year
    });
    toast('Task marked done!');
  } else {
    // Remove today's completion record
    await remove(ref(db, `completions/${empKey}/${type}/${taskKey}/${todayStr}`));
    // Clear legacy fields
    await update(ref(db, `tasks/${empKey}/${type}/${taskKey}`), {
      done: false, doneAt: '', doneDate: '', doneMonth: -1, doneYear: -1
    });
    toast('Task unmarked');
  }
};

function buildSimpleTaskCol(list, type, empKey, prefix) {
  const title = type==='checklist' ? 'Checklist Tasks' : 'Delegation Tasks';
  const todayStr = fmtDate(new Date());
  let rows = list.map(t => {
    const sd = schedDisp(t);
    // For recurring tasks, check today's completion record; for 'once', any completion counts
    let isDoneToday;
    if (t.freq === 'once') {
      const allDates = completions?.[empKey]?.[type]?.[t._key];
      isDoneToday = !!(allDates && Object.keys(allDates).length > 0) || !!t.done;
    } else {
      isDoneToday = !!getCompletion(empKey, type, t._key, todayStr);
    }
    return `<div class="task-mini-row">
      <div class="done-dot ${isDoneToday?'g':'e'}"></div>
      <span style="flex:1;font-size:.79rem">${t.text}${sd?`<div class="sched-note">&#128197; ${sd}</div>`:''}</span>
      ${freqTag(t.freq)}
    </div>`;
  }).join('');
  if (!list.length) rows = `<div style="font-size:.76rem;color:var(--mid);padding:6px 0">No tasks yet</div>`;

  return `<div>
    <div class="task-col-title">${title}</div>
    <div style="margin-bottom:10px">${rows}</div>
    <div class="add-task-row">
      <input type="text" id="${prefix}_inp_${empKey}" placeholder="Add task..."/>
      <select id="${prefix}_frq_${empKey}" onchange="mgrToggleSched('${prefix}','${empKey}')">
        ${type==='delegation'?'<option value="once">Once</option>':''}
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
      <input type="time" id="${prefix}_tm_${empKey}" title="Scheduled time (must be done by)" placeholder="By time"/>
      <input type="date" id="${prefix}_sd_${empKey}" style="display:none"/>
      <button onclick="mgrAddTask('${type}','${empKey}','${prefix}')">+ Add</button>
    </div>
    <div id="${prefix}_hint_${empKey}" style="font-size:.63rem;color:var(--amber);margin-top:3px;display:none"></div>
  </div>`;
}

window.mgrToggleSched = (prefix, empKey) => {
  const f = document.getElementById(`${prefix}_frq_${empKey}`).value;
  const sd = document.getElementById(`${prefix}_sd_${empKey}`);
  const hint = document.getElementById(`${prefix}_hint_${empKey}`);
  const show = (f==='weekly'||f==='monthly'||f==='yearly');
  if (sd) sd.style.display = show ? 'block' : 'none';
  if (hint) { hint.textContent = freqHint(f); hint.style.display = show ? 'block' : 'none'; }
};

window.mgrAddTask = async (type, empKey, prefix) => {
  const inp  = document.getElementById(`${prefix}_inp_${empKey}`);
  const frq  = document.getElementById(`${prefix}_frq_${empKey}`);
  const sd   = document.getElementById(`${prefix}_sd_${empKey}`);
  const tm   = document.getElementById(`${prefix}_tm_${empKey}`);
  if (!inp || !inp.value.trim()) return;
  const freq      = frq.value;
  const schedDate = (freq==='daily'||freq==='once') ? '' : (sd?.value||'');
  const schedTime = tm?.value||'';
  const newRef    = push(ref(db, `tasks/${empKey}/${type}`));
  await set(newRef, { text:inp.value.trim(), freq, done:false, doneAt:'', schedDate, schedTime });
  inp.value = ''; if (sd) sd.value = ''; if (tm) tm.value = '';
  toast('Task added');
};

/* ═══════════ TEAM PERFORMANCE ═══════════ */
function renderMgrPerf() {
  const selYear = new Date().getFullYear();
  const staffEmps = employees.filter(e => e.access !== 'admin');
  // Use window globals for synced state
  const perfViewDate = window.selPerfDate || new Date();
  // curSelMonth tracks the month of the viewed date so the dropdown stays in sync
  const curSelMonth = perfViewDate.getMonth();
  const scores    = staffEmps.map(e => {
    const key = getEmpKey(e);
    // Only count tasks that are scheduled for the selected date
    const cl  = getTaskList(key, 'checklist').filter(t => isTaskVisibleOnDate(t, perfViewDate));
    const dl  = getTaskList(key, 'delegation').filter(t => isTaskVisibleOnDate(t, perfViewDate));

/* ═══════════ WEEKLY REPORTS ═══════════ */
function getWeekRange(date) {
  // Get Monday-Sunday week containing the date
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
  const monday = new Date(d); monday.setDate(diff); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  return { start: monday, end: sunday };
}

function getWeeksInRange(startDate, endDate) {
  const weeks = [];
  let current = new Date(startDate);
  while (current <= endDate) {
    const week = getWeekRange(current);
    const weekKey = fmtDate(week.start);
    if (!weeks.find(w => fmtDate(w.start) === weekKey)) {
      weeks.push(week);
    }
    current = new Date(week.start);
    current.setDate(current.getDate() + 7);
  }
  return weeks;
}

function calcWeekScore(empKey, weekStart, weekEnd) {
  const cl = getTaskList(empKey, 'checklist').map(t => ({...t, _type: 'checklist'}));
  const dl = getTaskList(empKey, 'delegation').map(t => ({...t, _type: 'delegation'}));
  const allTasks = [...cl, ...dl];
  let totalTasks = 0, doneTasks = 0, lateTasks = 0, missedTasks = 0;
  const missedList = [];
  const lateList = [];
  const today = new Date(); today.setHours(0,0,0,0);

  // Walk each day of the week
  for (let d = new Date(weekStart); d <= weekEnd && d <= today; d.setDate(d.getDate() + 1)) {
    const dayDate = new Date(d);
    const dayStr = fmtDate(dayDate);
    allTasks.forEach(t => {
      if (!isTaskVisibleOnDate(t, dayDate)) return;
      if (t.freq === 'once') return; // skip one-time tasks in weekly view
      totalTasks++;
      const status = getTaskStatus(t, dayDate, empKey, t._type);
      if (status === 'done-ontime') doneTasks++;
      else if (status === 'done-late') {
        lateTasks++; doneTasks++;
        const actualDoneAt = getDoneAtForDate(t, dayDate, empKey, t._type);
        const sMin = parseTimeToMinutes(t.schedTime);
        const dMin = parseTimeToMinutes(actualDoneAt);
        const delta = (sMin >= 0 && dMin >= 0) ? dMin - sMin : 0;
        lateList.push({
          text: t.text, date: fmtDisp(dayDate), freq: t.freq,
          schedTime: t.schedTime, doneAt: actualDoneAt, delta
        });
      }
      else if (status === 'missed') {
        missedTasks++;
        missedList.push({ text: t.text, date: fmtDisp(dayDate), freq: t.freq, schedTime: t.schedTime });
      }
    });
  }
  const completionPct = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 100;
  const negScore = -(100 - completionPct);
  return { totalTasks, doneTasks, lateTasks, missedTasks, negScore, missedList, lateList, completionPct };
}

/* ═══════════ EXCEL EXPORTS ═══════════ */
function ensureXLSX() {
  if (typeof XLSX === 'undefined') {
    toast('Excel library not loaded — check internet connection');
    return false;
  }
  return true;
}

/* Export a weekly report for ALL staff for the selected week */
window.exportWeeklyExcel = function(weekStart, weekEnd) {
  if (!ensureXLSX()) return;
  const staffEmps = employees.filter(e => e.access !== 'admin');
  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryData = [
    ['PAL MENS WEAR — Weekly Performance Report'],
    [`Week: ${fmtDisp(weekStart)} to ${fmtDisp(weekEnd)}`],
    [`Generated: ${fmtDisp(new Date())} at ${timeNow()}`],
    [],
    ['Employee', 'Role', 'Total Tasks', 'Done', 'On Time', 'Late', 'Missed', 'Completion %', 'Deficit %', 'Grade']
  ];
  staffEmps.forEach(emp => {
    const key = getEmpKey(emp);
    const ws = calcWeekScore(key, weekStart, weekEnd);
    const onTimeCount = ws.doneTasks - ws.lateTasks;
    const grade = ws.negScore >= -15 ? 'A' : ws.negScore >= -30 ? 'B' : ws.negScore >= -50 ? 'C' : 'D';
    summaryData.push([
      emp.name, emp.role,
      ws.totalTasks, ws.doneTasks, onTimeCount, ws.lateTasks, ws.missedTasks,
      `${ws.completionPct}%`, `${ws.negScore}%`, grade
    ]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
  ws1['!cols'] = [{wch:22},{wch:15},{wch:12},{wch:8},{wch:10},{wch:8},{wch:10},{wch:13},{wch:11},{wch:8}];
  // Merge title row
  ws1['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:9}},
    {s:{r:1,c:0},e:{r:1,c:9}},
    {s:{r:2,c:0},e:{r:2,c:9}}
  ];
  XLSX.utils.book_append_sheet(wb, ws1, 'Summary');

  // Sheet 2: Late Tasks (all staff combined)
  const lateData = [['Employee','Role','Task','Date','Scheduled','Actual','Minutes Late','Frequency']];
  staffEmps.forEach(emp => {
    const key = getEmpKey(emp);
    const ws = calcWeekScore(key, weekStart, weekEnd);
    ws.lateList.forEach(l => {
      lateData.push([emp.name, emp.role, l.text, l.date, fmtTimeDisp(l.schedTime), fmtTimeDisp(l.doneAt), l.delta, l.freq]);
    });
  });
  if (lateData.length === 1) lateData.push(['(No late tasks this week)']);
  const ws2 = XLSX.utils.aoa_to_sheet(lateData);
  ws2['!cols'] = [{wch:22},{wch:15},{wch:36},{wch:22},{wch:12},{wch:12},{wch:13},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Late Tasks');

  // Sheet 3: Missed Tasks (all staff combined)
  const missedData = [['Employee','Role','Task','Date','Scheduled','Status','Frequency']];
  staffEmps.forEach(emp => {
    const key = getEmpKey(emp);
    const ws = calcWeekScore(key, weekStart, weekEnd);
    ws.missedList.forEach(m => {
      missedData.push([emp.name, emp.role, m.text, m.date, fmtTimeDisp(m.schedTime) || '—', 'Not done', m.freq]);
    });
  });
  if (missedData.length === 1) missedData.push(['(No missed tasks this week)']);
  const ws3 = XLSX.utils.aoa_to_sheet(missedData);
  ws3['!cols'] = [{wch:22},{wch:15},{wch:36},{wch:22},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Missed Tasks');

  // Sheet 4: Day-by-day detail for each employee
  staffEmps.forEach(emp => {
    const key = getEmpKey(emp);
    const cl = getTaskList(key, 'checklist').map(t => ({...t, _type:'checklist'}));
    const dl = getTaskList(key, 'delegation').map(t => ({...t, _type:'delegation'}));
    const allTasks = [...cl, ...dl];
    const detailData = [
      [`${emp.name} — Day-by-day detail`],
      [],
      ['Date','Day','Task','Type','Frequency','Scheduled','Actual','Status','Minutes Late/Early']
    ];
    const today = new Date(); today.setHours(0,0,0,0);
    for (let d = new Date(weekStart); d <= weekEnd && d <= today; d.setDate(d.getDate() + 1)) {
      const dayDate = new Date(d);
      allTasks.forEach(t => {
        if (!isTaskVisibleOnDate(t, dayDate)) return;
        if (t.freq === 'once') return;
        const status = getTaskStatus(t, dayDate, key, t._type);
        const actual = getDoneAtForDate(t, dayDate, key, t._type);
        let delta = '';
        if (status === 'done-late' || status === 'done-ontime') {
          const sMin = parseTimeToMinutes(t.schedTime);
          const dMin = parseTimeToMinutes(actual);
          if (sMin >= 0 && dMin >= 0) {
            const diff = dMin - sMin;
            delta = diff > 0 ? `+${diff}m late` : diff < 0 ? `${diff}m early` : 'on time';
          }
        }
        const statusLabel = {
          'done-ontime': 'On time', 'done-late': 'Late',
          'missed': 'MISSED', 'pending': 'Pending'
        }[status] || status;
        detailData.push([
          fmtDate(dayDate), DAYS[dayDate.getDay()], t.text,
          t._type === 'checklist' ? 'Checklist' : 'Delegation', t.freq,
          fmtTimeDisp(t.schedTime) || '—',
          actual ? fmtTimeDisp(actual) : (status === 'missed' ? 'Not done' : '—'),
          statusLabel, delta
        ]);
      });
    }
    const ws = XLSX.utils.aoa_to_sheet(detailData);
    ws['!cols'] = [{wch:12},{wch:10},{wch:36},{wch:12},{wch:10},{wch:12},{wch:12},{wch:10},{wch:14}];
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:8}}];
    // Sheet names are limited to 31 chars in Excel
    const sheetName = emp.name.slice(0, 28);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  const fileName = `PAL_Weekly_Report_${fmtDate(weekStart)}_to_${fmtDate(weekEnd)}.xlsx`;
  XLSX.writeFile(wb, fileName);
  toast('Excel downloaded!');
};

    ['PAL MENS WEAR — Full Task Completion History'],
    [`Generated: ${fmtDisp(new Date())} at ${timeNow()}`],
    [],
    ['Employee','Role','Task','Type','Frequency','Scheduled','Completion Date','Actual Time','Status']
  ];

  staffEmps.forEach(emp => {
    const key = getEmpKey(emp);
    ['checklist','delegation'].forEach(type => {
      const taskList = getTaskList(key, type);
      taskList.forEach(t => {
        const taskCompletions = completions?.[key]?.[type]?.[t._key] || {};
        const dates = Object.keys(taskCompletions).sort();
        if (dates.length === 0) return;
        dates.forEach(dateStr => {
          const comp = taskCompletions[dateStr];
          const doneAt = comp?.doneAt || '';
          const sMin = parseTimeToMinutes(t.schedTime);
          const dMin = parseTimeToMinutes(doneAt);
          let statusLabel = 'Done';
          if (t.schedTime && sMin >= 0 && dMin >= 0) {
            statusLabel = dMin <= sMin ? 'On time' : 'Late';
          }
          const dateObj = new Date(dateStr + 'T00:00:00');
          data.push([
            emp.name, emp.role, t.text,
            type === 'checklist' ? 'Checklist' : 'Delegation', t.freq,
            fmtTimeDisp(t.schedTime) || '—',
            fmtDisp(dateObj), fmtTimeDisp(doneAt), statusLabel
          ]);
        });
      });
    });
  });

  if (data.length === 4) data.push(['(No completion history yet — data will accumulate as staff tick tasks)']);

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:22},{wch:15},{wch:36},{wch:12},{wch:10},{wch:12},{wch:22},{wch:12},{wch:10}];
  ws['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:8}},
    {s:{r:1,c:0},e:{r:1,c:8}}
  ];
  XLSX.utils.book_append_sheet(wb, ws, 'History');

  XLSX.writeFile(wb, `PAL_Full_History_${fmtDate(new Date())}.xlsx`);
  toast('Excel downloaded!');
};

function renderWeeklyReports() {
  const staffEmps = employees.filter(e => e.access !== 'admin');
  const selWeekOffset = typeof window.selWeekOffset === 'number' ? window.selWeekOffset : 0;
  const now = new Date();
  const thisWeek = getWeekRange(now);

  // Generate last 4 weeks plus the selected offset
  const weeks = [];
  for (let i = 3; i >= 0; i--) {
    const d = new Date(thisWeek.start);
    d.setDate(d.getDate() - (i * 7) + (selWeekOffset * 7));
    weeks.push(getWeekRange(d));
  }

  const selectedWeek = weeks[weeks.length - 1]; // current/latest week in view
  const weekLabel = `${fmtDate(selectedWeek.start).slice(5)} to ${fmtDate(selectedWeek.end).slice(5)}`;

  let html = `
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <label style="font-size:.75rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px">Navigate weeks:</label>
    <button onclick="window.selWeekOffset=(window.selWeekOffset||0)-4;renderWeeklyReports()" style="padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-family:'DM Sans',sans-serif;font-size:.74rem;cursor:pointer">&#8592;&#8592; 4 weeks</button>
    <button onclick="window.selWeekOffset=(window.selWeekOffset||0)-1;renderWeeklyReports()" style="padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-family:'DM Sans',sans-serif;font-size:.74rem;cursor:pointer">&#8592; Prev</button>
    <button onclick="window.selWeekOffset=0;renderWeeklyReports()" style="padding:5px 12px;border-radius:20px;border:none;background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.74rem;cursor:pointer">This week</button>
    <button onclick="window.selWeekOffset=(window.selWeekOffset||0)+1;renderWeeklyReports()" style="padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-family:'DM Sans',sans-serif;font-size:.74rem;cursor:pointer">Next &#8594;</button>
    <div style="font-size:.82rem;font-weight:600;color:var(--navy);margin-left:auto">${fmtDisp(selectedWeek.start)} — ${fmtDisp(selectedWeek.end)}</div>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <button onclick="exportWeeklyExcel(new Date('${fmtDate(selectedWeek.start)}T00:00:00'), new Date('${fmtDate(selectedWeek.end)}T00:00:00'))" style="padding:8px 16px;border-radius:8px;border:none;background:#1F6E3A;color:#fff;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px">
      &#128229; Download this week (Excel)
    </button>
    <button onclick="exportFullHistoryExcel()" style="padding:8px 16px;border-radius:8px;border:1px solid #1F6E3A;background:#fff;color:#1F6E3A;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px">
      &#128196; Download full history (Excel)
    </button>

  <div style="font-size:.65rem;color:var(--mid);margin-bottom:16px;padding:8px 12px;background:var(--white);border:1px solid var(--border);border-radius:8px">
    <strong>Scoring:</strong> 0% = perfect (all tasks done on time) · Negative = deficit (what was missed or not done). Example: −20% means 20% of tasks were missed/incomplete.
  </div>`;

  // Weekly comparison table across 4 weeks
  html += `<div style="background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);background:#fdfbf8">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--navy)">4-Week Score Comparison</div>
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="background:var(--cream)">
          <th style="padding:10px 14px;text-align:left;font-size:.7rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)">Employee</th>

    const prev = weekScores.length >= 2 ? weekScores[weekScores.length - 2].negScore : last;
    const trendDiff = last - prev;
    const trendIcon = trendDiff > 0 ? '&#9650;' : trendDiff < 0 ? '&#9660;' : '&#8212;';

        <div style="font-size:.65rem;color:${trendColor};font-weight:600">${trendDiff > 0 ? '+' : ''}${trendDiff}%</div>
      </td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  // Detailed per-employee cards for selected week
  html += `<div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--navy);margin-bottom:12px">Detailed Report — ${fmtDisp(selectedWeek.start)} to ${fmtDisp(selectedWeek.end)}</div>
  <div class="perf-grid">`;

    const key = getEmpKey(emp);

    const negClr = ws.negScore >= -15 ? '#27500A' : ws.negScore >= -30 ? '#0C447C' : ws.negScore >= -50 ? '#633806' : '#791F1F';

    const grade = ws.negScore >= -15 ? 'A' : ws.negScore >= -30 ? 'B' : ws.negScore >= -50 ? 'C' : 'D';

      <div class="perf-top">${avEl(emp,40)}

        </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px">
        <div style="background:#EAF3DE;border-radius:8px;padding:7px 10px;text-align:center">
          <div style="font-size:1.1rem;font-weight:600;color:#27500A">${ws.doneTasks}</div>
          <div style="font-size:.6rem;color:#3B6D11;font-weight:500">DONE</div>

        <div style="background:#FAEEDA;border-radius:8px;padding:7px 10px;text-align:center">
          <div style="font-size:1.1rem;font-weight:600;color:#633806">${ws.lateTasks}</div>
          <div style="font-size:.6rem;color:#854F0B;font-weight:500">LATE</div>

        <div style="font-size:.75rem;font-weight:600;color:#27500A">&#10003; No missed or late tasks this week!</div>
      </div>` : '')}
    </div>`;
  });

  html += '</div>';
  document.getElementById('weeklyReports').innerHTML = html;
}

function buildAdminTaskCol(list, type, empKey, prefix) {
  const title = type==='checklist' ? 'Checklist Tasks' : 'Delegation Tasks';
  const et    = editingTask;
  let rows    = '';
  list.forEach(t => {
    const isEt = et && et.type===type && et.empKey===empKey && et.taskKey===t._key;
    const sd   = schedDisp(t);
    if (isEt) {
      const needSched = (t.freq==='weekly'||t.freq==='monthly'||t.freq==='yearly');
      rows += `<tr style="background:#fffdf5">
        <td colspan="5" style="padding:8px 5px">
          <div style="display:flex;flex-direction:column;gap:6px">
            <input class="tei" id="et_text" value="${t.text}"/>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <select class="tes" id="et_freq" onchange="onAdminFreqChange()">
                <option value="daily"${t.freq==='daily'?' selected':''}>Daily</option>
                <option value="weekly"${t.freq==='weekly'?' selected':''}>Weekly</option>
                <option value="monthly"${t.freq==='monthly'?' selected':''}>Monthly</option>
                <option value="yearly"${t.freq==='yearly'?' selected':''}>Yearly</option>
                <option value="once"${t.freq==='once'?' selected':''}>Once</option>
              </select>
              <input type="date" class="ted" id="et_sched" value="${t.schedDate||''}" style="display:${needSched?'block':'none'}"/>
              <span id="et_hint" style="font-size:.63rem;color:var(--amber);display:${needSched?'inline':'none'}">${freqHint(t.freq)}</span>
              <input type="time" class="ted" id="et_time" value="${t.schedTime||''}" title="Must be done by this time" style="width:120px"/>
              <button class="save-tb" onclick="saveTaskEdit('${type}','${empKey}','${t._key}')">Save</button>
              <button class="cancel-tb" onclick="clearEditTask()">Cancel</button>
            </div>
          </div>
        </td>
      </tr>`;
    } else {
      // Show today's real status from the completions store (not stale legacy t.done)
      const todayStr = fmtDate(new Date());
      const comp = getCompletion(empKey, type, t._key, todayStr);
      const isDoneToday = !!comp || (t.freq === 'once' && t.done);
      const doneAtDisp = comp?.doneAt || (t.freq === 'once' ? t.doneAt : '');
      rows += `<tr>
        <td><div class="done-dot ${isDoneToday?'g':'e'}"></div></td>
        <td style="max-width:180px;font-size:.79rem">${t.text}${sd?`<div class="sched-note">&#128197; ${sd}</div>`:''}</td>
        <td>${freqTag(t.freq)}</td>
        <td style="font-size:.67rem;color:${isDoneToday?'var(--green)':'#ccc'}">${isDoneToday?'&#10003; '+fmtTimeDisp(doneAtDisp):'—'}</td>
        <td style="white-space:nowrap">
          <button class="edit-tb" onclick="startEditTask('${type}','${empKey}','${t._key}')">Edit</button>
          <button class="del-tb" onclick="adminDelTask('${type}','${empKey}','${t._key}')">&#215;</button>
        </td>
      </tr>`;
    }
  });

  return `<div>
    <div class="task-col-title">${title}</div>
    <table class="t-table">
      <thead><tr><th style="width:16px"></th><th>Task</th><th style="width:72px">Freq</th><th style="width:62px">Done</th><th style="width:52px"></th></tr></thead>
      <tbody>${rows}${!list.length?'<tr><td colspan="5" style="font-size:.75rem;color:var(--mid);padding:8px 5px">No tasks yet</td></tr>':''}</tbody>
    </table>
    <div class="add-task-row">
      <input type="text" id="${prefix}_ainp_${empKey}" placeholder="Add task..."/>
      <select id="${prefix}_afrq_${empKey}" onchange="adminToggleSched('${prefix}','${empKey}')">
        ${type==='delegation'?'<option value="once">Once</option>':''}
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
      <input type="time" id="${prefix}_atm_${empKey}" title="Scheduled time (must be done by)" placeholder="By time"/>
      <input type="date" id="${prefix}_asd_${empKey}" style="display:none"/>
      <button onclick="adminAddTask('${type}','${empKey}','${prefix}')">+ Add</button>
    </div>
    <div id="${prefix}_ahint_${empKey}" style="font-size:.63rem;color:var(--amber);margin-top:3px;display:none"></div>
  </div>`;
}

window.onAdminFreqChange = () => {
  const f    = document.getElementById('et_freq').value;
  const sd   = document.getElementById('et_sched');
  const hint = document.getElementById('et_hint');
  const show = (f==='weekly'||f==='monthly'||f==='yearly');
  if (sd)   sd.style.display   = show ? 'block'  : 'none';
  if (hint) { hint.textContent = freqHint(f); hint.style.display = show ? 'inline' : 'none'; }
};
window.startEditTask = (type, empKey, taskKey) => { setEditTask(type,empKey,taskKey); };
window.saveTaskEdit  = async (type, empKey, taskKey) => {
  const text  = document.getElementById('et_text').value.trim();
  const freq  = document.getElementById('et_freq').value;
  const sched = document.getElementById('et_sched').value;
  const tm    = document.getElementById('et_time');
  if (!text) { toast('Task name cannot be empty'); return; }
  await update(ref(db, `tasks/${empKey}/${type}/${taskKey}`), {
    text, freq,
    schedDate:(freq==='daily'||freq==='once')?'':sched,
    schedTime: tm ? tm.value : ''
  });
  editingTask = null;
  toast('Task updated');
};
window.adminToggleSched = (prefix, empKey) => {
  const f    = document.getElementById(`${prefix}_afrq_${empKey}`).value;
  const sd   = document.getElementById(`${prefix}_asd_${empKey}`);
  const hint = document.getElementById(`${prefix}_ahint_${empKey}`);
  const show = (f==='weekly'||f==='monthly'||f==='yearly');
  if (sd)   sd.style.display   = show ? 'block' : 'none';
  if (hint) { hint.textContent = freqHint(f); hint.style.display = show ? 'block' : 'none'; }
};
window.adminAddTask = async (type, empKey, prefix) => {
  const inp  = document.getElementById(`${prefix}_ainp_${empKey}`);
  const frq  = document.getElementById(`${prefix}_afrq_${empKey}`);
  const sd   = document.getElementById(`${prefix}_asd_${empKey}`);
  const tm   = document.getElementById(`${prefix}_atm_${empKey}`);
  if (!inp || !inp.value.trim()) return;
  const freq      = frq.value;
  const schedDate = (freq==='daily'||freq==='once') ? '' : (sd?.value||'');
  const schedTime = tm?.value||'';
  const newRef    = push(ref(db, `tasks/${empKey}/${type}`));

window.changePIN = async (key, name) => {
  const inp = document.getElementById(`pin_${key}`);
  if (!inp) { toast('Error — please refresh page'); return; }
  const pin = inp.value.trim();
  if (pin.length !== 4 || isNaN(pin)) { toast('PIN must be exactly 4 digits'); inp.focus(); return; }
  try {
    await update(ref(db, `employees/${key}`), { pin });
    await loadEmployees();
    populateSelect();
    renderAdminStaff();
    toast(`${name}'s PIN changed to ${pin} successfully!`);
  } catch(e) { toast('Failed to save. Try again.'); console.error(e); }
};

window.changeRole = async (key, name, currentAccess) => {
  const roles = ['staff','manager','admin'];
  const labels = ['Staff','Manager','Admin'];
  const cur = roles.indexOf(currentAccess);
  const next = (cur + 1) % roles.length;
  // Safety: prevent demoting the only remaining admin (would lock everyone out)
  if (currentAccess === 'admin' && roles[next] !== 'admin') {
    const adminCount = employees.filter(e => e.access === 'admin').length;
    if (adminCount <= 1) {
      toast('Cannot change role — at least one Admin must exist');
      return;
    }
  }
  // Safety: prevent demoting yourself from admin
  if (key === currentUser._key && currentAccess === 'admin' && roles[next] !== 'admin') {
    toast('You cannot demote yourself. Ask another admin.');
    return;
  }
  if (!confirm(`Change ${name}'s role from ${labels[cur]} to ${labels[next]}?`)) return;
  try {
    await update(ref(db, `employees/${key}`), { access: roles[next] });
    await loadEmployees();
    populateSelect();
    renderAdminStaff();
    toast(`${name} is now ${labels[next]}`);
  } catch(e) { toast('Failed to save. Try again.'); }
};

window.addEmp = async () => {
  const name = document.getElementById('new_name').value.trim();
  const pin  = document.getElementById('new_pin').value.trim();
  if (!name) { toast('Enter a name'); return; }
  if (pin.length !== 4 || isNaN(pin)) { toast('PIN must be 4 digits'); return; }
  const role   = document.getElementById('new_role').value || 'Staff';
  const shift  = document.getElementById('new_shift').value;
  const access = document.getElementById('new_access').value;
  const newRef = push(ref(db, 'employees'));
  await set(newRef, { name, role, shift, pin, access });
  await set(ref(db, `tasks/${newRef.key}`), { checklist:{}, delegation:{} });
  document.getElementById('new_name').value = '';
  document.getElementById('new_pin').value  = '';
  document.getElementById('new_role').value = '';
  await loadEmployees();
  populateSelect();
  renderAdminStaff();
  toast(name + ' added');
};
window.removeEmp = async (key) => {
  const emp = employees.find(e => e._key === key);
  if (!emp) return;
  // Safety: prevent removing the last admin
  if (emp.access === 'admin') {
    const adminCount = employees.filter(e => e.access === 'admin').length;
    if (adminCount <= 1) {
      toast('Cannot remove — at least one Admin must exist');
      return;
    }
  }
  if (!confirm(`Remove ${emp.name} and all their tasks? This cannot be undone.`)) return;
  await remove(ref(db, `employees/${key}`));
  await remove(ref(db, `tasks/${key}`));
  await remove(ref(db, `completions/${key}`));
  await loadEmployees();
  populateSelect();
  editingEmp = null;
  renderAdminStaff();
  toast(emp.name + ' removed');
};
window.saveEmp = async (key) => {
  const pinEl = document.getElementById(`ep_${key}`);
  const nameEl = document.getElementById(`en_${key}`);
  const roleEl = document.getElementById(`er_${key}`);
  const shiftEl = document.getElementById(`es_${key}`);
  const accessEl = document.getElementById(`ea_${key}`);
  if (!pinEl || !nameEl) { toast('Error: form not found. Try clicking Edit again.'); return; }
  const pin = pinEl.value.trim();
  const name = nameEl.value.trim();
  if (!name) { toast('Name cannot be empty'); return; }
  if (pin.length !== 4 || isNaN(pin)) { toast('PIN must be exactly 4 digits (numbers only)'); return; }
  try {
    await update(ref(db, `employees/${key}`), {
      name,
      role:   roleEl ? roleEl.value.trim() : '',
      shift:  shiftEl ? shiftEl.value : 'Full Day',
      pin,
      access: accessEl ? accessEl.value : 'staff'

    await loadEmployees();
    populateSelect();
    editingEmp = null;
    renderAdminStaff();
    toast(`${name} updated successfully! New PIN: ${pin}`);

    toast('Save failed. Please try again.');
    console.error(e);

};

/* ═══════════ INIT ═══════════ */
async function migrateLegacyToCompletions() {
  // For any task that has legacy done/doneDate/doneAt fields but no matching
  // completion record, backfill the completion. This preserves history from
  // ticks made before the completions store existed.
  const tSnap = await get(ref(db, 'tasks'));
  if (!tSnap.exists()) return;
  const cSnap = await get(ref(db, 'completions'));
  const existingComps = cSnap.exists() ? cSnap.val() : {};
  const updates = {};
  let migrated = 0;

  tSnap.forEach(empSnap => {
    const empKey = empSnap.key;
    empSnap.forEach(typeSnap => {
      const type = typeSnap.key;
      if (type !== 'checklist' && type !== 'delegation') return;
      typeSnap.forEach(taskSnap => {
        const t = taskSnap.val();
        const tKey = taskSnap.key;
        if (t.done && t.doneDate && t.doneAt) {
          // Check if this completion already exists
          const exists = existingComps?.[empKey]?.[type]?.[tKey]?.[t.doneDate];
          if (!exists) {
            updates[`${empKey}/${type}/${tKey}/${t.doneDate}`] = {
              doneAt: t.doneAt,
              timestamp: Date.now(),
              migrated: true
            };
            migrated++;
          }
        }
      });
    });
  });
  if (migrated > 0) {
    await update(ref(db, 'completions'), updates);
    console.log(`Migrated ${migrated} legacy completions to per-date store`);
  }
}

async function clearLegacyDoneFlags() {
  // Each tick day resets the legacy done flag so the UI checkbox reflects
  // TODAY's state at a glance. Completions history is preserved separately.
  // IMPORTANT: migrateLegacyToCompletions must run BEFORE this.
  const todayDate = fmtDate(new Date());
  const snap = await get(ref(db, 'tasks'));
  if (!snap.exists()) return;
  const updates = {};
  snap.forEach(empSnap => {
    empSnap.forEach(typeSnap => {
      if (typeSnap.key !== 'checklist' && typeSnap.key !== 'delegation') return;
      typeSnap.forEach(taskSnap => {
        const t = taskSnap.val();
        // Only reset recurring tasks whose legacy doneDate isn't today
        if (t.done && t.freq !== 'once' && t.doneDate && t.doneDate !== todayDate) {
          const path = `${empSnap.key}/${typeSnap.key}/${taskSnap.key}`;
          updates[path + '/done']      = false;
          updates[path + '/doneAt']    = '';
          updates[path + '/doneDate']  = '';
          updates[path + '/doneMonth'] = -1;
          updates[path + '/doneYear']  = -1;
        }
      });
    });
  });
  if (Object.keys(updates).length > 0) {
    await update(ref(db, 'tasks'), updates);
  }
}

async function init() {
  showLoading('Connecting to database...');
  try {
    await seedIfEmpty();
    await loadEmployees();
    await migrateLegacyToCompletions();
    await clearLegacyDoneFlags();
    populateSelect();
    hideLoading();
    document.getElementById('loginScreen').classList.add('active');
  } catch(e) {
    hideLoading();
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('loginErr').textContent = 'Database connection failed. Check your Firebase config.';
    console.error(e);
  }
}
init();

.sva-late{background:var(--amber-bg);color:var(--amber);}
.missed-row{background:#fff8f8!important;border-left:3px solid #f0b8b8;}
.status-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.s-ontime{background:#EAF3DE;color:#27500A;}
.s-late{background:#FAEEDA;color:#633806;}
.s-missed{background:#FCEBEB;color:#791F1F;}
.freq-tag{font-size:.64rem;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.f-daily{background:var(--green-bg);color:var(--green);}
.f-weekly{background:var(--blue-bg);color:var(--blue);}
.f-monthly{background:var(--amber-bg);color:var(--amber);}
.f-yearly{background:var(--purple-bg);color:var(--purple);}
.f-once{background:#f0e8fb;color:#5a2d82;}
.empty-state{text-align:center;padding:32px;color:var(--mid);font-size:.86rem;}
.info-bar{border-radius:10px;padding:11px 16px;font-size:.82rem;font-weight:500;margin-bottom:16px;}
.mgr-bar{background:var(--amber-bg);border:0.5px solid #d4a96a;color:var(--amber);}
.admin-bar{background:#FFF3E0;border:0.5px solid #FFCC80;color:#BF360C;}
.emp-block{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.emp-block-head{display:flex;align-items:center;gap:12px;padding:13px 18px;background:#fdfbf8;border-bottom:1px solid var(--border);}
.emp-n{font-size:.9rem;font-weight:600;color:var(--navy);}
.emp-m{font-size:.72rem;color:var(--mid);margin-top:1px;}
.tasks-section{padding:14px 18px;}
.tasks-two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:640px){.tasks-two-col{grid-template-columns:1fr;}}
.task-col-title{font-size:.69rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.task-mini-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:.79rem;}
.task-mini-row:last-child{border-bottom:none;}
.done-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.done-dot.g{background:var(--green);}
.done-dot.e{background:#ddd;}
.t-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.t-table th{font-size:.63rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.3px;padding:4px 5px;border-bottom:1px solid var(--border);text-align:left;}
.t-table td{padding:6px 5px;border-bottom:1px solid var(--border);vertical-align:middle;}
.t-table tr:last-child td{border-bottom:none;}
.t-table tr:hover td{background:#fdfbf8;}
.tei{width:100%;padding:5px 8px;border:1px solid var(--gold);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.79rem;color:var(--charcoal);background:var(--white);outline:none;}
.tes{padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.77rem;color:var(--charcoal);background:var(--white);outline:none;}
.ted{padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.77rem;color:var(--charcoal);background:var(--white);outline:none;width:130px;}
.save-tb{padding:4px 10px;border-radius:16px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);font-family:'DM Sans',sans-serif;font-size:.71rem;cursor:pointer;font-weight:600;}
.cancel-tb{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--white);color:var(--mid);font-family:'DM Sans',sans-serif;font-size:.71rem;cursor:pointer;}
.del-tb{background:none;border:none;color:#ddd;font-size:14px;padding:1px 4px;border-radius:4px;cursor:pointer;}
.del-tb:hover{background:var(--red-bg);color:var(--red);}
.edit-tb{background:none;border:none;color:#bbb;font-size:.7rem;padding:2px 6px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.edit-tb:hover{background:var(--blue-bg);color:var(--blue);}
.add-task-row{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border);}
.add-task-row input{flex:1;min-width:100px;padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.79rem;color:var(--charcoal);background:var(--cream);outline:none;}
.add-task-row input:focus{border-color:var(--gold);background:var(--white);}
.add-task-row input[type=date]{flex:none;width:132px;}
.add-task-row select{padding:6px 7px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.77rem;color:var(--charcoal);background:var(--cream);outline:none;}
.add-task-row button{padding:6px 12px;border-radius:8px;border:1px solid var(--navy);background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:600;cursor:pointer;}
.mgmt-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.mgmt-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--navy);margin-bottom:13px;}
.ae-row{display:flex;gap:8px;flex-wrap:wrap;}
.ae-row input,.ae-row select{padding:7px 9px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--charcoal);background:var(--cream);outline:none;}
.ae-row input{flex:1;min-width:100px;}
.ae-row button{padding:8px 14px;border-radius:8px;border:1px solid var(--navy);background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}
.btn-row{display:flex;gap:5px;flex-shrink:0;}
.bx{font-size:.7rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--mid);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;}
.bx:hover{background:var(--cream);}
.bx-save{border-color:#b5d4a0;color:var(--green);}
.bx-save:hover{background:var(--green-bg);}
.bx-danger{border-color:#f0b8b8;color:var(--red);}
.bx-danger:hover{background:var(--red-bg);}
.edit-fields{flex:1;display:flex;flex-direction:column;gap:5px;}
.edit-fields input,.edit-fields select{padding:5px 9px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--charcoal);background:var(--cream);outline:none;}
.edit-sub{display:flex;gap:5px;}
.edit-sub select,.edit-sub input{flex:1;}
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;}
.perf-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;}
.perf-top{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.perf-score{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--navy);line-height:1;}
.grade-pill{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;margin-top:3px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:.7rem;color:var(--mid);margin-bottom:3px;}
.bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.month-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.month-row label{font-size:.82rem;color:var(--mid);font-weight:500;}
.month-row select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--charcoal);background:var(--white);outline:none;}
#loadingOverlay{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:20px;}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingMsg{font-size:.82rem;color:rgba(255,255,255,.5);}
#toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:var(--gold-light);padding:10px 18px;border-radius:10px;font-size:.81rem;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateY(0);}
@media(max-width:600px){nav{padding:0 12px;}.tab-bar{padding:0 6px;}.page{padding:12px 10px;}.login-box{padding:26px 16px;margin:12px;}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loading-logo">PAL MENS WEAR</div>
  <div class="loading-spinner"></div>
  <div id="loadingMsg">Connecting...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen">
  <div class="login-box">
    <div class="login-logo">PAL <span style="color:var(--mid);font-weight:400">MENS WEAR</span></div>
    <div class="login-sub">Staff Portal</div>
    <div class="role-legend">
      <span class="rl-badge rl-admin">Admin</span>
      <span class="rl-badge rl-mgr">Manager</span>
      <span class="rl-badge rl-staff">Staff</span>
    </div>
    <label class="ll">Select your name</label>
    <select class="lsel" id="empSel" onchange="onEmpChange()">
      <option value="">-- Select employee --</option>
    </select>
    <label class="ll">Enter your PIN</label>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <input class="lpin" type="password" id="pinInp" maxlength="4" placeholder="4-digit PIN"
      oninput="onPinInput()" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="lbtn" onclick="doLogin()">Sign In</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <nav>
    <div class="nav-logo">PAL <span>MENS WEAR</span></div>
    <div class="nav-right">
      <div style="text-align:right">
        <div class="nav-name" id="navName"></div>
        <div class="nav-sub"  id="navSub"></div>
      </div>
      <div id="navAv"></div>
      <div class="role-chip" id="roleChip"></div>
      <button class="lo-btn" onclick="doLogout()">Sign out</button>
    </div>
  </nav>
  <div class="tab-bar" id="tabBar"></div>
  <div id="myChecklist"  class="page active"></div>
  <div id="myDelegation" class="page"></div>
  <div id="mgrAddTasks"  class="page"></div>
  <div id="mgrPerf"      class="page"></div>
  <div id="weeklyReports" class="page"></div>
  <div id="adminManage"  class="page"></div>
  <div id="adminStaff"   class="page"></div>
</div>

<div id="toast"></div>
</body>
</html>
