const fmtDisp  = d => DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
const shiftDay = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };

function avC(emp) {
  const i = employees.indexOf(emp) % AVC.length;
  return AVC[i < 0 ? 0 : i];
}
function avEl(emp, sz) {
  const c   = avC(emp);
  const ini = emp.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c.bg};color:${c.cl};display:flex;align-items:center;justify-content:center;font-size:${sz>32?12:10}px;font-weight:700;flex-shrink:0">${ini}</div>`;
}
function freqTag(f) {
  const m = {daily:'f-daily Daily',weekly:'f-weekly Weekly',monthly:'f-monthly Monthly',yearly:'f-yearly Yearly',once:'f-once Once'};
  const p = (m[f]||'f-once '+f).split(' ');
  return `<span class="freq-tag ${p[0]}">${p.slice(1).join(' ')}</span>`;
}
function schedDisp(t) {
  if (!t.schedDate || t.freq==='daily' || t.freq==='once') return '';
  const d = new Date(t.schedDate+'T00:00:00');
  if (t.freq==='weekly')  return `Every ${DAYS[d.getDay()]} from ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  if (t.freq==='monthly') return `Every ${d.getDate()} of the month`;
  if (t.freq==='yearly')  return `Every ${d.getDate()} ${MONTHS[d.getMonth()]}`;
  return '';
}
function freqHint(f) {
  if (f==='weekly')  return 'Pick the start day of this week';
  if (f==='monthly') return 'Pick the date it repeats monthly';
  if (f==='yearly')  return 'Pick the date it repeats yearly';
  return '';
}
function getPct(list) {
  if (!list || !list.length) return 0;
  return Math.round(list.filter(t=>t.done).length / list.length * 100);
}
function getScore(id) {
  const cl = Object.values(tasks[id]?.checklist  || {});
  const dl = Object.values(tasks[id]?.delegation || {});
  return Math.round((getPct(cl) + getPct(dl)) / 2);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function showLoading(msg='Loading...') {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingMsg').textContent = msg;
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

/* ═══════════ FIREBASE: LOAD EMPLOYEES ═══════════ */
async function loadEmployees() {
  const snap = await get(ref(db, 'employees'));
  employees = [];
  if (snap.exists()) {
    snap.forEach(child => {
      employees.push({ _key: child.key, ...child.val() });
    });
  }
}

/* ═══════════ FIREBASE: LIVE SYNC TASKS ═══════════ */
function startLiveSync() {
  if (liveUnsub) liveUnsub();
  liveUnsub = onValue(ref(db, 'tasks'), snap => {
    tasks = {};
    if (snap.exists()) {
      snap.forEach(empSnap => {
        const empKey = empSnap.key;
        tasks[empKey] = { checklist: {}, delegation: {} };
        empSnap.forEach(typeSnap => {
          const type = typeSnap.key;
          if (type === 'checklist' || type === 'delegation') {
            typeSnap.forEach(taskSnap => {
              tasks[empKey][type][taskSnap.key] = { _key: taskSnap.key, ...taskSnap.val() };
            });
          }
        });
      });
    }
    // Re-render current page live
    refreshCurrentPage();
  });
}

function refreshCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id;
  if (id==='myChecklist')   renderMyChecklist();
  else if (id==='myDelegation') renderMyDelegation();
  else if (id==='mgrAddTasks') renderMgrAddTasks();
  else if (id==='mgrPerf')    renderMgrPerf();
  else if (id==='adminManage') renderAdminManage();
  else if (id==='adminStaff') renderAdminStaff();
}

/* ═══════════ LOGIN ═══════════ */
function populateSelect() {
  const sel = document.getElementById('empSel');
  sel.innerHTML = '<option value="">-- Select employee --</option>';
  employees.forEach(e => {
    const o = document.createElement('option');
    o.value = e._key;
    o.textContent = e.name + (e.access==='admin' ? ' (Admin)' : e.access==='manager' ? ' (Manager)' : ' ('+e.role+')');
    sel.appendChild(o);

window.onEmpChange = () => {
  document.getElementById('pinInp').value = '';
  updateDots(0);
  document.getElementById('loginErr').textContent = '';
};
window.onPinInput  = () => updateDots(document.getElementById('pinInp').value.length);
function updateDots(n) {
  for (let i=0; i<4; i++)
    document.getElementById('pd'+i).className = 'pin-dot' + (i < n ? ' f' : '');
}

window.doLogin = async () => {
  const key = document.getElementById('empSel').value;
  const pin = document.getElementById('pinInp').value.trim();
  const err = document.getElementById('loginErr');
  if (!key) { err.textContent = 'Please select your name.'; return; }
  if (pin.length !== 4) { err.textContent = 'PIN must be 4 digits.'; return; }
  const emp = employees.find(e => e._key === key);
  if (!emp || emp.pin !== pin) {
    err.textContent = 'Wrong PIN. Try again.';
    document.getElementById('pinInp').value = '';
    updateDots(0);
    return;
  }
  currentUser = emp;
  err.textContent = '';
  showApp();
};

window.doLogout = () => {
  currentUser = null;
  if (liveUnsub) { liveUnsub(); liveUnsub = null; }
  document.getElementById('loginErr').textContent = '';
  document.getElementById('pinInp').value = '';
  document.getElementById('empSel').value = '';
  updateDots(0);
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('appScreen').classList.remove('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('myChecklist').classList.add('active');
};

/* ═══════════ APP ═══════════ */
function showApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  const c  = avC(currentUser);
  const av = document.getElementById('navAv');
  av.style.cssText = `width:34px;height:34px;border-radius:50%;background:${c.bg};color:${c.cl};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0`;
  av.textContent = currentUser.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  document.getElementById('navName').textContent = currentUser.name;
  document.getElementById('navSub').textContent  = currentUser.role + ' · ' + currentUser.shift;
  const chip = document.getElementById('roleChip');
  if (isAdmin())      { chip.textContent='Admin';   chip.className='role-chip chip-admin'; }
  else if (isMgr())   { chip.textContent='Manager'; chip.className='role-chip chip-mgr';   }
  else                { chip.textContent='Staff';   chip.className='role-chip chip-staff';  }
  buildTabs();
  startLiveSync();
  goTab(isAdmin() ? 'adminManage' : 'myChecklist', 0);
}

function buildTabs() {
  const bar  = document.getElementById('tabBar');
  const tabs = isAdmin()
    ? [{id:'adminManage',label:'Manage Tasks',cls:'t-admin'},{id:'adminStaff',label:'Manage Staff',cls:'t-admin'},{id:'mgrPerf',label:'Team Performance',cls:'t-admin'}]
    : isMgr()
      ? [{id:'myChecklist',label:'My Checklist'},{id:'myDelegation',label:'My Delegation'},{id:'mgrAddTasks',label:'Add Tasks',cls:'t-mgr'},{id:'mgrPerf',label:'Team Performance',cls:'t-mgr'}]
      : [{id:'myChecklist',label:'My Checklist'},{id:'myDelegation',label:'My Delegation'}];
  bar.innerHTML = tabs.map((t,i) =>
    `<button class="tab-btn${t.cls?' '+t.cls:''}" id="tab_${i}" onclick="goTab('${t.id}',${i})">${t.label}</button>`
  ).join('');
}

window.goTab = (pageId, idx) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  const btn = document.getElementById('tab_'+idx);
  if (btn) btn.classList.add('active');
  const renders = {
    myChecklist:renderMyChecklist, myDelegation:renderMyDelegation,
    mgrAddTasks:renderMgrAddTasks, mgrPerf:renderMgrPerf,
    adminManage:renderAdminManage, adminStaff:renderAdminStaff
  };
  if (renders[pageId]) renders[pageId]();
};

/* ═══════════ TASK VIEW HELPERS ═══════════ */
function getEmpKey(emp) { return emp._key; }
function getTaskList(empKey, type) {
  return Object.values(tasks[empKey]?.[type] || {});
}

function buildDateBar(dateObj, onChangeFn, prevFn, nextFn) {
  return `<div class="date-bar">
    <label>Date:</label>
    <input type="date" value="${fmtDate(dateObj)}" onchange="${onChangeFn}"/>
    <div class="date-disp">${fmtDisp(dateObj)}</div>
    <div class="d-nav">
      <button onclick="${prevFn}">&#8592;</button>
      <button onclick="${nextFn}">&#8594;</button>
      <button class="today-btn" onclick="clDate=new Date();renderMyChecklist()">Today</button>
    </div>
  </div>`;
}

/* ═══════════ MY CHECKLIST ═══════════ */
function renderMyChecklist() {
  const u   = currentUser;
  const key = getEmpKey(u);
  const list = getTaskList(key, 'checklist');
  const done = list.filter(t=>t.done).length;
  const pct  = getPct(list);
  const groups = {daily:[],weekly:[],monthly:[],yearly:[],once:[]};
  list.forEach(t => { if (groups[t.freq]) groups[t.freq].push(t); else groups.daily.push(t); });
  const labels = {daily:'Daily tasks',weekly:'Weekly tasks',monthly:'Monthly tasks',yearly:'Yearly tasks',once:'One-time tasks'};

  let html = `
  <div class="date-bar">
    <label>Date:</label>
    <input type="date" value="${fmtDate(clDate)}" onchange="clDate=new Date(this.value+'T00:00:00');renderMyChecklist()"/>
    <div class="date-disp">${fmtDisp(clDate)}</div>
    <div class="d-nav">
      <button onclick="clDate=shiftDay(clDate,-1);renderMyChecklist()">&#8592;</button>
      <button onclick="clDate=shiftDay(clDate,1);renderMyChecklist()">&#8594;</button>
      <button class="today-btn" onclick="clDate=new Date();renderMyChecklist()">Today</button>
    </div>
  </div>
  <div class="live-badge">&#9679; Live — ticks sync instantly to manager</div>
  <div class="prog-wrap">
    <div class="prog-top"><span>My checklist progress</span><span>${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:var(--green)"></div></div>
    <div class="prog-sub">${done} of ${list.length} tasks completed</div>
  </div>
  <div class="ov-grid">
    <div class="ov-card"><div class="ov-num">${done}</div><div class="ov-lbl">Done</div></div>
    <div class="ov-card"><div class="ov-num">${list.length-done}</div><div class="ov-lbl">Remaining</div></div>
    <div class="ov-card"><div class="ov-num">${pct}%</div><div class="ov-lbl">Complete</div></div>
  </div>`;

  Object.entries(groups).forEach(([freq, items]) => {
    if (!items.length) return;
    html += `<div class="sec-title">${labels[freq]}</div>`;
    items.forEach(t => {
      const sd = schedDisp(t);
      html += `<div class="task-card">
        <div class="task-row${t.done?' done-row':''}" onclick="toggleTask('checklist','${key}','${t._key}')">
          <div class="chk${t.done?' done':''}" id="chk_cl_${t._key}"></div>
          <div class="ttext${t.done?' x':''}">
            ${t.text}
            ${sd ? `<div class="sched-note">&#128197; ${sd}</div>` : ''}
          </div>
          ${freqTag(t.freq)}
          ${t.done && t.doneAt ? `<span class="done-time">&#10003; ${t.doneAt}</span>` : ''}
        </div>
      </div>`;
    });
  });
  if (!list.length) html += `<div class="empty-state">No tasks assigned yet. Ask your manager.</div>`;
  document.getElementById('myChecklist').innerHTML = html;
}

  document.getElementById('myDelegation').innerHTML = html;
}

/* ═══════════ TOGGLE TASK (Firebase write) ═══════════ */
window.toggleTask = async (type, empKey, taskKey) => {
  const t = tasks[empKey]?.[type]?.[taskKey];
  if (!t) return;
  const newDone   = !t.done;
  const newDoneAt = newDone ? timeNow() : '';
  await update(ref(db, `tasks/${empKey}/${type}/${taskKey}`), { done: newDone, doneAt: newDoneAt });
  toast(newDone ? 'Task marked done!' : 'Task unmarked');
};

/* ═══════════ MANAGER: ADD TASKS ═══════════ */
function renderMgrAddTasks() {
  const staffEmps = employees.filter(e => e.access === 'staff');
  let html = `<div class="info-bar mgr-bar">Manager — you can add tasks to staff. To edit or delete tasks contact Admin.</div>`;
  staffEmps.forEach(emp => {
    const key  = getEmpKey(emp);
    const cl   = getTaskList(key, 'checklist');
    const dl   = getTaskList(key, 'delegation');
    html += `<div class="emp-block">
      <div class="emp-block-head">
        ${avEl(emp, 36)}
        <div style="flex:1"><div class="emp-n">${emp.name}</div><div class="emp-m">${emp.role} · ${emp.shift}</div></div>
        <span style="font-size:.72rem;color:var(--mid)">${cl.length+dl.length} tasks</span>
      </div>
      <div class="tasks-section">
        <div class="tasks-two-col">
          ${buildSimpleTaskCol(cl,'checklist',key,'cl')}
          ${buildSimpleTaskCol(dl,'delegation',key,'dl')}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('mgrAddTasks').innerHTML = html;
}

function buildSimpleTaskCol(list, type, empKey, prefix) {
  const title = type==='checklist' ? 'Checklist Tasks' : 'Delegation Tasks';
  let rows = list.map(t => {
    const sd = schedDisp(t);
    return `<div class="task-mini-row">
      <div class="done-dot ${t.done?'g':'e'}"></div>
      <span style="flex:1;font-size:.79rem">${t.text}${sd?`<div class="sched-note">&#128197; ${sd}</div>`:''}</span>
      ${freqTag(t.freq)}
    </div>`;
  }).join('');
  if (!list.length) rows = `<div style="font-size:.76rem;color:var(--mid);padding:6px 0">No tasks yet</div>`;

  return `<div>
    <div class="task-col-title">${title}</div>
    <div style="margin-bottom:10px">${rows}</div>
    <div class="add-task-row">
      <input type="text" id="${prefix}_inp_${empKey}" placeholder="Add task..."/>
      <select id="${prefix}_frq_${empKey}" onchange="mgrToggleSched('${prefix}','${empKey}')">
        ${type==='delegation'?'<option value="once">Once</option>':''}
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
      <input type="date" id="${prefix}_sd_${empKey}" style="display:none"/>
      <button onclick="mgrAddTask('${type}','${empKey}','${prefix}')">+ Add</button>
    </div>
    <div id="${prefix}_hint_${empKey}" style="font-size:.63rem;color:var(--amber);margin-top:3px;display:none"></div>
  </div>`;
}

window.mgrToggleSched = (prefix, empKey) => {
  const f = document.getElementById(`${prefix}_frq_${empKey}`).value;
  const sd = document.getElementById(`${prefix}_sd_${empKey}`);
  const hint = document.getElementById(`${prefix}_hint_${empKey}`);
  const show = (f==='weekly'||f==='monthly'||f==='yearly');
  if (sd) sd.style.display = show ? 'block' : 'none';
  if (hint) { hint.textContent = freqHint(f); hint.style.display = show ? 'block' : 'none'; }
};

window.mgrAddTask = async (type, empKey, prefix) => {
  const inp  = document.getElementById(`${prefix}_inp_${empKey}`);
  const frq  = document.getElementById(`${prefix}_frq_${empKey}`);
  const sd   = document.getElementById(`${prefix}_sd_${empKey}`);
  if (!inp || !inp.value.trim()) return;
  const freq      = frq.value;
  const schedDate = (freq==='daily'||freq==='once') ? '' : (sd?.value||'');
  const newRef    = push(ref(db, `tasks/${empKey}/${type}`));
  await set(newRef, { text:inp.value.trim(), freq, done:false, doneAt:'', schedDate });
  inp.value = ''; if (sd) sd.value = '';
  toast('Task added');
};

/* ═══════════ TEAM PERFORMANCE ═══════════ */
function renderMgrPerf() {
  const staffEmps = employees.filter(e => e.access !== 'admin');
  const scores    = staffEmps.map(e => {
    const key = getEmpKey(e);
    const cl  = getTaskList(key, 'checklist');
    const dl  = getTaskList(key, 'delegation');
    return { emp:e, key, cl, dl, clP:getPct(cl), dlP:getPct(dl), score:getScore(key) };
  });
  const avg      = scores.length ? Math.round(scores.reduce((a,s)=>a+s.score,0)/scores.length) : 0;
  const top      = scores.length ? scores.reduce((a,s)=>s.score>a.score?s:a,scores[0]) : null;
  const onTrack  = scores.filter(s=>s.score>=70).length;

  let html = `<div class="live-badge" style="margin-bottom:16px">&#9679; Live — updates in real time as staff tick tasks</div>
  <div class="month-row"><label>Month:</label><select onchange="selMonth=parseInt(this.value);renderMgrPerf()">`;
  MONTHS.forEach((m,i) => html += `<option value="${i}"${i===selMonth?' selected':''}>${m} ${new Date().getFullYear()}</option>`);
  html += `</select></div>
  <div class="ov-grid" style="margin-bottom:20px">
    <div class="ov-card"><div class="ov-num">${avg}%</div><div class="ov-lbl">Team avg</div></div>
    <div class="ov-card"><div class="ov-num">${onTrack}/${scores.length}</div><div class="ov-lbl">On track</div></div>
    <div class="ov-card"><div class="ov-num">${top?top.emp.name.split(' ')[0]:'—'}</div><div class="ov-lbl">Top performer</div></div>
  </div><div class="perf-grid">`;

  scores.forEach(({emp, cl, dl, clP, dlP, score}) => {
    const grade = score>=85?'A':score>=70?'B':score>=50?'C':'D';
    const [gbg,gcl] = score>=85?['#EAF3DE','#27500A']:score>=70?['#E6F1FB','#0C447C']:score>=50?['#FAEEDA','#633806']:['#FCEBEB','#791F1F'];
    html += `<div class="perf-card">
      <div class="perf-top">${avEl(emp,40)}
        <div style="flex:1">
          <div style="font-size:.9rem;font-weight:600;color:var(--navy)">${emp.name}</div>
          <div style="font-size:.72rem;color:var(--mid);margin-top:2px">${emp.role} · ${emp.shift}</div>
        </div>
        <div style="text-align:right">
          <div class="perf-score">${score}%</div>
          <span class="grade-pill" style="background:${gbg};color:${gcl}">Grade ${grade}</span>
        </div>
      </div>
      <div class="bar-lbl"><span>Checklist (${cl.filter(t=>t.done).length}/${cl.length})</span><span>${clP}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${clP}%;background:#3B6D11"></div></div>
      <div class="bar-lbl"><span>Delegation (${dl.filter(t=>t.done).length}/${dl.length})</span><span>${dlP}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${dlP}%;background:#534AB7"></div></div>
    </div>`;
  });
  document.getElementById('mgrPerf').innerHTML = html + '</div>';
}

/* ═══════════ ADMIN: MANAGE TASKS ═══════════ */
function renderAdminManage() {
  const staffEmps = employees.filter(e => e.access !== 'admin');
  let html = `<div class="info-bar admin-bar">&#9881; Admin — Full task control. Add, edit and delete tasks for all staff.</div>`;
  staffEmps.forEach(emp => {
    const key = getEmpKey(emp);
    const cl  = getTaskList(key, 'checklist');
    const dl  = getTaskList(key, 'delegation');
    html += `<div class="emp-block">
      <div class="emp-block-head">
        ${avEl(emp,36)}
        <div style="flex:1"><div class="emp-n">${emp.name}</div><div class="emp-m">${emp.role} · ${emp.shift}</div></div>
      </div>
      <div class="tasks-section">
        <div class="tasks-two-col">
          ${buildAdminTaskCol(cl,'checklist',key,'cl')}
          ${buildAdminTaskCol(dl,'delegation',key,'dl')}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('adminManage').innerHTML = html;
}

function buildAdminTaskCol(list, type, empKey, prefix) {
  const title = type==='checklist' ? 'Checklist Tasks' : 'Delegation Tasks';
  const et    = editingTask;
  let rows    = '';
  list.forEach(t => {
    const isEt = et && et.type===type && et.empKey===empKey && et.taskKey===t._key;
    const sd   = schedDisp(t);
    if (isEt) {
      const needSched = (t.freq==='weekly'||t.freq==='monthly'||t.freq==='yearly');
      rows += `<tr style="background:#fffdf5">
        <td colspan="5" style="padding:8px 5px">
          <div style="display:flex;flex-direction:column;gap:6px">
            <input class="tei" id="et_text" value="${t.text}"/>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <select class="tes" id="et_freq" onchange="onAdminFreqChange()">
                <option value="daily"${t.freq==='daily'?' selected':''}>Daily</option>
                <option value="weekly"${t.freq==='weekly'?' selected':''}>Weekly</option>
                <option value="monthly"${t.freq==='monthly'?' selected':''}>Monthly</option>
                <option value="yearly"${t.freq==='yearly'?' selected':''}>Yearly</option>
                <option value="once"${t.freq==='once'?' selected':''}>Once</option>
              </select>
              <input type="date" class="ted" id="et_sched" value="${t.schedDate||''}" style="display:${needSched?'block':'none'}"/>
              <span id="et_hint" style="font-size:.63rem;color:var(--amber);display:${needSched?'inline':'none'}">${freqHint(t.freq)}</span>
              <button class="save-tb" onclick="saveTaskEdit('${type}','${empKey}','${t._key}')">Save</button>
              <button class="cancel-tb" onclick="editingTask=null;renderAdminManage()">Cancel</button>
            </div>
          </div>
        </td>
      </tr>`;
    } else {
      rows += `<tr>
        <td><div class="done-dot ${t.done?'g':'e'}"></div></td>
        <td style="max-width:180px;font-size:.79rem">${t.text}${sd?`<div class="sched-note">&#128197; ${sd}</div>`:''}</td>
        <td>${freqTag(t.freq)}</td>
        <td style="font-size:.67rem;color:${t.done?'var(--green)':'#ccc'}">${t.done?'&#10003; '+t.doneAt:'—'}</td>
        <td style="white-space:nowrap">
          <button class="edit-tb" onclick="startEditTask('${type}','${empKey}','${t._key}')">Edit</button>
          <button class="del-tb" onclick="adminDelTask('${type}','${empKey}','${t._key}')">&#215;</button>
        </td>
      </tr>`;
    }
  });

  return `<div>
    <div class="task-col-title">${title}</div>
    <table class="t-table">
      <thead><tr><th style="width:16px"></th><th>Task</th><th style="width:72px">Freq</th><th style="width:62px">Done</th><th style="width:52px"></th></tr></thead>
      <tbody>${rows}${!list.length?'<tr><td colspan="5" style="font-size:.75rem;color:var(--mid);padding:8px 5px">No tasks yet</td></tr>':''}</tbody>
    </table>
    <div class="add-task-row">
      <input type="text" id="${prefix}_ainp_${empKey}" placeholder="Add task..."/>
      <select id="${prefix}_afrq_${empKey}" onchange="adminToggleSched('${prefix}','${empKey}')">
        ${type==='delegation'?'<option value="once">Once</option>':''}
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
      <input type="date" id="${prefix}_asd_${empKey}" style="display:none"/>
      <button onclick="adminAddTask('${type}','${empKey}','${prefix}')">+ Add</button>
    </div>
    <div id="${prefix}_ahint_${empKey}" style="font-size:.63rem;color:var(--amber);margin-top:3px;display:none"></div>
  </div>`;
}

window.onAdminFreqChange = () => {
  const f    = document.getElementById('et_freq').value;
  const sd   = document.getElementById('et_sched');
  const hint = document.getElementById('et_hint');
  const show = (f==='weekly'||f==='monthly'||f==='yearly');
  if (sd)   sd.style.display   = show ? 'block'  : 'none';
  if (hint) { hint.textContent = freqHint(f); hint.style.display = show ? 'inline' : 'none'; }
};
window.startEditTask = (type, empKey, taskKey) => { editingTask={type,empKey,taskKey}; renderAdminManage(); };
window.saveTaskEdit  = async (type, empKey, taskKey) => {
  const text  = document.getElementById('et_text').value.trim();
  const freq  = document.getElementById('et_freq').value;
  const sched = document.getElementById('et_sched').value;
  if (!text) { toast('Task name cannot be empty'); return; }
  await update(ref(db, `tasks/${empKey}/${type}/${taskKey}`), {
    text, freq, schedDate:(freq==='daily'||freq==='once')?'':sched
  });
  editingTask = null;
  toast('Task updated');
};
window.adminToggleSched = (prefix, empKey) => {
  const f    = document.getElementById(`${prefix}_afrq_${empKey}`).value;
  const sd   = document.getElementById(`${prefix}_asd_${empKey}`);
  const hint = document.getElementById(`${prefix}_ahint_${empKey}`);
  const show = (f==='weekly'||f==='monthly'||f==='yearly');
  if (sd)   sd.style.display   = show ? 'block' : 'none';
  if (hint) { hint.textContent = freqHint(f); hint.style.display = show ? 'block' : 'none'; }
};
window.adminAddTask = async (type, empKey, prefix) => {
  const inp  = document.getElementById(`${prefix}_ainp_${empKey}`);
  const frq  = document.getElementById(`${prefix}_afrq_${empKey}`);
  const sd   = document.getElementById(`${prefix}_asd_${empKey}`);
  if (!inp || !inp.value.trim()) return;
  const freq      = frq.value;
  const schedDate = (freq==='daily'||freq==='once') ? '' : (sd?.value||'');
  const newRef    = push(ref(db, `tasks/${empKey}/${type}`));
  await set(newRef, { text:inp.value.trim(), freq, done:false, doneAt:'', schedDate });
  inp.value = ''; if (sd) sd.value = '';
  toast('Task added');
};
window.adminDelTask = async (type, empKey, taskKey) => {
  if (!confirm('Delete this task permanently?')) return;
  await remove(ref(db, `tasks/${empKey}/${type}/${taskKey}`));
  if (editingTask?.taskKey === taskKey) editingTask = null;
  toast('Task deleted');
};

/* ═══════════ ADMIN: MANAGE STAFF ═══════════ */
function renderAdminStaff() {
  let rows = '';
  employees.forEach(emp => {
    const isEdit = editingEmp === emp._key;
    rows += `<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)">
      ${avEl(emp,34)}
      ${isEdit ? `<div class="edit-fields">
        <input id="en_${emp._key}" value="${emp.name}" placeholder="Full name"/>
        <div class="edit-sub">
          <input id="er_${emp._key}" value="${emp.role}" placeholder="Role"/>
          <select id="es_${emp._key}">
            <option${emp.shift==='Full Day'?' selected':''}>Full Day</option>
            <option${emp.shift==='Morning'?' selected':''}>Morning</option>
            <option${emp.shift==='Evening'?' selected':''}>Evening</option>
          </select>
        </div>
        <div class="edit-sub">
          <input id="ep_${emp._key}" value="${emp.pin}" maxlength="4" placeholder="4-digit PIN" style="letter-spacing:4px"/>
          <select id="ea_${emp._key}">
            <option value="staff"${emp.access==='staff'?' selected':''}>Staff</option>
            <option value="manager"${emp.access==='manager'?' selected':''}>Manager</option>
            <option value="admin"${emp.access==='admin'?' selected':''}>Admin</option>
          </select>
        </div>
      </div>` : `<div style="flex:1">
          <div style="font-size:.88rem;font-weight:600;color:var(--navy)">${emp.name}</div>
          <div style="font-size:.72rem;color:var(--mid)">${emp.role} · ${emp.shift} · PIN: ${emp.pin} · <strong style="color:${emp.access==='admin'?'#E65100':emp.access==='manager'?'var(--amber)':'var(--blue)'}">${emp.access.charAt(0).toUpperCase()+emp.access.slice(1)}</strong></div>
        </div>`}
      <div class="btn-row">
        ${isEdit
          ? `<button class="bx bx-save" onclick="saveEmp('${emp._key}')">Save</button>
             <button class="bx" onclick="editingEmp=null;renderAdminStaff()">Cancel</button>`
          : `<button class="bx" onclick="editingEmp='${emp._key}';renderAdminStaff()">Edit</button>`}
        ${emp._key !== currentUser._key ? `<button class="bx bx-danger" onclick="removeEmp('${emp._key}')">Remove</button>` : ''}
      </div>
    </div>`;
  });

  document.getElementById('adminStaff').innerHTML = `
    <div class="info-bar admin-bar">&#9881; Admin — Add, edit or remove staff. Set their role and PIN here.</div>
    <div class="mgmt-box">
      <div class="mgmt-title">Add new staff member</div>
      <div class="ae-row">
        <input type="text" id="new_name" placeholder="Full name..."/>
        <input type="text" id="new_role" placeholder="Role (e.g. Cashier)"/>
        <select id="new_shift"><option>Full Day</option><option>Morning</option><option>Evening</option></select>
        <input type="text" id="new_pin" maxlength="4" placeholder="4-digit PIN" style="max-width:96px;letter-spacing:3px"/>
        <select id="new_access"><option value="staff">Staff</option><option value="manager">Manager</option><option value="admin">Admin</option></select>
        <button onclick="addEmp()">+ Add</button>
      </div>
    </div>
    <div class="mgmt-box">
      <div class="mgmt-title">All staff — ${employees.length} members</div>
      <div>${rows}</div>
    </div>`;
}

window.addEmp = async () => {
  const name = document.getElementById('new_name').value.trim();
  const pin  = document.getElementById('new_pin').value.trim();
  if (!name) { toast('Enter a name'); return; }
  if (pin.length !== 4 || isNaN(pin)) { toast('PIN must be 4 digits'); return; }
  const role   = document.getElementById('new_role').value || 'Staff';
  const shift  = document.getElementById('new_shift').value;
  const access = document.getElementById('new_access').value;
  const newRef = push(ref(db, 'employees'));
  await set(newRef, { name, role, shift, pin, access });
  await set(ref(db, `tasks/${newRef.key}`), { checklist:{}, delegation:{} });
  document.getElementById('new_name').value = '';
  document.getElementById('new_pin').value  = '';
  document.getElementById('new_role').value = '';
  await loadEmployees();
  populateSelect();
  toast(name + ' added');
};
window.removeEmp = async (key) => {
  if (!confirm('Remove this staff member and all their tasks?')) return;
  const emp = employees.find(e => e._key === key);
  await remove(ref(db, `employees/${key}`));
  await remove(ref(db, `tasks/${key}`));
  await loadEmployees();
  populateSelect();
  editingEmp = null;
  toast((emp?.name || 'Staff') + ' removed');
};
window.saveEmp = async (key) => {
  const pin = document.getElementById(`ep_${key}`).value.trim();
  if (pin.length !== 4 || isNaN(pin)) { toast('PIN must be 4 digits'); return; }
  await update(ref(db, `employees/${key}`), {
    name:   document.getElementById(`en_${key}`).value.trim(),
    role:   document.getElementById(`er_${key}`).value.trim(),
    shift:  document.getElementById(`es_${key}`).value,
    pin,
    access: document.getElementById(`ea_${key}`).value
  });
  await loadEmployees();
  populateSelect();
  editingEmp = null;
  toast('Updated');
};

/* ═══════════ EXPOSE GLOBALS FOR HTML ONCLICK ═══════════ */
window.shiftDay       = shiftDay;
window.renderMyChecklist  = renderMyChecklist;
window.renderMyDelegation = renderMyDelegation;
window.renderMgrPerf      = renderMgrPerf;
window.editingEmp         = editingEmp;
window.editingTask        = editingTask;
window.selMonth           = selMonth;
window.clDate             = clDate;
window.dlDate             = dlDate;

/* ═══════════ INIT ═══════════ */
async function init() {
  showLoading('Connecting to database...');
  try {
    await seedIfEmpty();
    await loadEmployees();
    populateSelect();
    hideLoading();
    document.getElementById('loginScreen').classList.add('active');
  } catch(e) {
    hideLoading();
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('loginErr').textContent = 'Database connection failed. Check your Firebase config.';
    console.error(e);
  }
}
init();
</script>

<style>
:root{
  --navy:#0d1b2a;--gold:#c9a84c;--gold-light:#e8c97e;
  --cream:#f8f4ee;--charcoal:#2c2c2c;--mid:#6b6b6b;
  --border:#e0d8cc;--white:#fff;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --blue:#0C447C;--blue-bg:#E6F1FB;
  --amber:#633806;--amber-bg:#FAEEDA;
  --purple:#3C3489;--purple-bg:#EEEDFE;
  --red:#791F1F;--red-bg:#FCEBEB;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}
#loginScreen{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--navy);}
#loginScreen.active{display:flex;}
.login-box{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--navy);letter-spacing:3px;margin-bottom:4px;}
.login-sub{font-size:.76rem;color:var(--mid);letter-spacing:1px;text-transform:uppercase;margin-bottom:30px;}
.role-legend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.rl-badge{font-size:.66rem;font-weight:600;padding:3px 10px;border-radius:20px;}
.rl-admin{background:#FFF3E0;color:#BF360C;}
.rl-mgr{background:var(--amber-bg);color:var(--amber);}
.rl-staff{background:var(--blue-bg);color:var(--blue);}
.ll{font-size:.71rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;text-align:left;display:block;margin-bottom:6px;}
.lsel,.lpin{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--charcoal);background:var(--cream);outline:none;margin-bottom:14px;}
.lsel:focus,.lpin:focus{border-color:var(--gold);background:var(--white);}
.lbtn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;}
.lbtn:hover{background:#1a2e42;}

.task-col-title{font-size:.69rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}

.add-task-row button{padding:6px 12px;border-radius:8px;border:1px solid var(--navy);background:var(--navy);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:600;cursor:pointer;}
.mgmt-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}

#loadingOverlay{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.loading-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:20px;}

@keyframes spin{to{transform:rotate(360deg)}}
#loadingMsg{font-size:.82rem;color:rgba(255,255,255,.5);}

</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loading-logo">PAL MENS WEAR</div>
  <div class="loading-spinner"></div>
  <div id="loadingMsg">Connecting...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen">
  <div class="login-box">
    <div class="login-logo">PAL <span style="color:var(--mid);font-weight:400">MENS WEAR</span></div>
    <div class="login-sub">Staff Portal</div>
    <div class="role-legend">
      <span class="rl-badge rl-admin">Admin</span>
      <span class="rl-badge rl-mgr">Manager</span>
      <span class="rl-badge rl-staff">Staff</span>
    </div>
    <label class="ll">Select your name</label>
    <select class="lsel" id="empSel" onchange="onEmpChange()">
      <option value="">-- Select employee --</option>
    </select>
    <label class="ll">Enter your PIN</label>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <input class="lpin" type="password" id="pinInp" maxlength="4" placeholder="4-digit PIN"
      oninput="onPinInput()" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="lbtn" onclick="doLogin()">Sign In</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <nav>
    <div class="nav-logo">PAL <span>MENS WEAR</span></div>
    <div class="nav-right">
      <div style="text-align:right">
        <div class="nav-name" id="navName"></div>
        <div class="nav-sub"  id="navSub"></div>
      </div>
      <div id="navAv"></div>
      <div class="role-chip" id="roleChip"></div>
      <button class="lo-btn" onclick="doLogout()">Sign out</button>
    </div>
  </nav>
  <div class="tab-bar" id="tabBar"></div>
  <div id="myChecklist"  class="page active"></div>
  <div id="myDelegation" class="page"></div>
  <div id="mgrAddTasks"  class="page"></div>
  <div id="mgrPerf"      class="page"></div>
  <div id="adminManage"  class="page"></div>
  <div id="adminStaff"   class="page"></div>
</div>

<div id="toast"></div>
</body>
</html>
